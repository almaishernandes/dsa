<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DSA — Desafio dos Servidores do Altar</title>
  <meta name="description" content="Desafio dos Servidores do Altar — Quiz de formação litúrgica e doutrinal.">
  <meta name="theme-color" content="#731828">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DSA">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0B0810;
      --bg2: #0F0C16;
      --card: #160D1E;
      --inp: #1E1228;
      --wine: #731828;
      --winel: #9B2438;
      --gold: #C8A84B;
      --goldl: #E5C96A;
      --ice: #F0EDE6;
      --dim: #8A7C6E;
      --dim2: #5A4E48;
      --ok: #1E6B40;
      --okl: #25994F;
      --err: #8C1515;
      --errl: #C02020;
      --bdr: #2D1840;
      --bdr2: #3D2450;
      --r: 12px;
      --rsm: 8px;
      --t: .2s ease;
      --shadow: 0 8px 32px rgba(0, 0, 0, .65);
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ice);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .serif {
      font-family: Georgia, 'Times New Roman', serif
    }

    .gold {
      color: var(--gold)
    }

    .dim {
      color: var(--dim)
    }

    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: fadeIn .25s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .ctr {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px
    }

    .ctr-sm {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      padding: 0 16px
    }

    .ctr-lg {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px
    }

    .card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 24px;
      box-shadow: var(--shadow)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: var(--rsm);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: var(--t);
      font-family: inherit;
      line-height: 1;
      white-space: nowrap
    }

    .btn:active:not(:disabled) {
      transform: scale(.97)
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed
    }

    .btn-gold {
      background: var(--gold);
      color: #1A0A00
    }

    .btn-gold:hover:not(:disabled) {
      background: var(--goldl)
    }

    .btn-wine {
      background: var(--wine);
      color: var(--ice)
    }

    .btn-wine:hover:not(:disabled) {
      background: var(--winel)
    }

    .btn-ok {
      background: var(--ok);
      color: #fff
    }

    .btn-ok:hover:not(:disabled) {
      background: var(--okl)
    }

    .btn-ghost {
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--bdr2)
    }

    .btn-ghost:hover:not(:disabled) {
      color: var(--ice);
      border-color: var(--dim2)
    }

    .btn-danger {
      background: transparent;
      color: #F87171;
      border: 1px solid var(--err)
    }

    .btn-danger:hover:not(:disabled) {
      background: var(--err);
      color: var(--ice)
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--gold);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 3px
    }

    .btn-link:hover {
      color: var(--goldl)
    }

    .btn-icon {
      padding: 7px 10px;
      font-size: 15px
    }

    .btn-full {
      width: 100%
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 13px
    }

    .fg {
      margin-bottom: 14px
    }

    .fl {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600
    }

    .fi {
      width: 100%;
      padding: 11px 14px;
      background: var(--inp);
      border: 1.5px solid var(--bdr);
      border-radius: var(--rsm);
      color: var(--ice);
      font-size: 14px;
      outline: none;
      transition: var(--t);
      font-family: inherit
    }

    .fi:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 168, 75, .15)
    }

    textarea.fi {
      min-height: 90px;
      resize: vertical;
      line-height: 1.55
    }

    select.fi option {
      background: var(--card)
    }

    .pw-wrap {
      position: relative
    }

    .pw-wrap .fi {
      padding-right: 42px
    }

    .pw-eye {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      font-size: 17px;
      line-height: 1;
      padding: 2px
    }

    .pw-eye:hover {
      color: var(--ice)
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px
    }

    .form-err {
      font-size: 13px;
      color: #FCA5A5;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: rgba(140, 21, 21, .2);
      border: 1px solid var(--err);
      border-radius: var(--rsm)
    }

    .form-ok {
      font-size: 13px;
      color: #86EFAC;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: rgba(30, 107, 64, .2);
      border: 1px solid var(--okl);
      border-radius: var(--rsm)
    }

    .optional {
      font-size: 10px;
      color: var(--dim2);
      font-weight: normal;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 5px
    }

    .req {
      color: var(--gold)
    }

    .pt {
      height: 5px;
      background: var(--bdr);
      border-radius: 3px;
      overflow: hidden
    }

    .pf {
      height: 100%;
      background: linear-gradient(90deg, var(--wine), var(--gold));
      border-radius: 3px;
      transition: width .4s ease
    }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600
    }

    .bw {
      background: rgba(115, 24, 40, .3);
      color: var(--gold);
      border: 1px solid var(--wine)
    }

    .bg {
      background: rgba(200, 168, 75, .15);
      color: var(--gold);
      border: 1px solid var(--gold)
    }

    .bo {
      background: rgba(30, 107, 64, .3);
      color: #4ADE80;
      border: 1px solid var(--okl)
    }

    .be {
      background: rgba(140, 21, 21, .3);
      color: #F87171;
      border: 1px solid var(--err)
    }

    .b-blue {
      background: rgba(30, 80, 140, .3);
      color: #93C5FD;
      border: 1px solid #1D4ED8
    }

    .dv {
      height: 1px;
      background: var(--bdr);
      margin: 18px 0
    }

    .dv-text {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--dim2);
      font-size: 13px;
      margin: 16px 0
    }

    .dv-text::before,
    .dv-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bdr)
    }

    .ans {
      width: 100%;
      padding: 13px 16px;
      background: var(--inp);
      border: 2px solid var(--bdr);
      border-radius: var(--rsm);
      color: var(--ice);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: var(--t);
      margin-bottom: 9px;
      display: flex;
      align-items: flex-start;
      gap: 11px;
      font-family: inherit;
      line-height: 1.5
    }

    .ans:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(200, 168, 75, .07)
    }

    .ans:disabled {
      cursor: default
    }

    .ans .ltr {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--bdr2);
      font-size: 12px;
      font-weight: 700;
      color: var(--dim);
      flex-shrink: 0;
      transition: var(--t)
    }

    .ans.correct {
      border-color: var(--okl);
      background: rgba(30, 107, 64, .2);
      animation: pulse-ok .35s ease
    }

    .ans.correct .ltr {
      background: var(--okl);
      color: #fff
    }

    .ans.wrong {
      border-color: var(--errl);
      background: rgba(140, 21, 21, .2);
      animation: shake .3s ease
    }

    .ans.wrong .ltr {
      background: var(--err);
      color: #fff
    }

    .ans.dimmed {
      opacity: .3
    }

    @keyframes pulse-ok {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.015)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-6px)
      }

      75% {
        transform: translateX(6px)
      }
    }

    .fb {
      padding: 13px 15px;
      border-radius: var(--rsm);
      font-size: 13px;
      margin-top: 11px;
      line-height: 1.65
    }

    .fb.err {
      background: rgba(140, 21, 21, .2);
      border: 1px solid var(--err);
      color: #FCA5A5
    }

    .fb.ok {
      background: rgba(30, 107, 64, .2);
      border: 1px solid var(--okl);
      color: #86EFAC
    }

    .qhdr {
      background: var(--card);
      border-bottom: 1px solid var(--bdr);
      padding: 11px 0;
      position: sticky;
      top: 0;
      z-index: 10
    }

    .qmeta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      font-size: 13px
    }

    .qtimer {
      font-family: 'Courier New', monospace;
      font-size: 16px;
      color: var(--gold);
      font-weight: 700
    }

    .qscore {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold)
    }

    .qval {
      display: inline-block;
      padding: 3px 11px;
      background: rgba(200, 168, 75, .13);
      border: 1px solid var(--gold);
      border-radius: 99px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 700
    }

    .sg {
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 16px 0 30px
    }

    .sr {
      display: flex;
      gap: 9px
    }

    .sr.rev {
      flex-direction: row-reverse
    }

    .sc {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 13px;
      cursor: pointer;
      transition: var(--t);
      position: relative;
      overflow: hidden;
      min-width: 0
    }

    .sc::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: transparent
    }

    .sc:hover:not(.locked) {
      transform: translateY(-2px);
      border-color: var(--gold)
    }

    .sc.locked {
      opacity: .4;
      cursor: not-allowed
    }

    .sc.done {
      border-color: var(--okl)
    }

    .sc.done::before {
      background: var(--okl)
    }

    .sc.avail {
      border-color: var(--wine)
    }

    .sc.avail::before {
      background: linear-gradient(90deg, var(--wine), var(--gold))
    }

    .sc-num {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 3px
    }

    .sc-ttl {
      font-family: Georgia, serif;
      font-size: 12px;
      color: var(--ice);
      font-weight: 600;
      line-height: 1.3
    }

    .sc-ico {
      font-size: 17px;
      margin-bottom: 5px
    }

    .dhdr {
      background: linear-gradient(180deg, rgba(115, 24, 40, .55) 0%, transparent 100%);
      padding: 26px 0 18px;
      border-bottom: 1px solid var(--bdr)
    }

    .stg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
      margin: 16px 0
    }

    .stb {
      background: var(--inp);
      border: 1px solid var(--bdr);
      border-radius: var(--rsm);
      padding: 14px;
      text-align: center
    }

    .stv {
      font-size: 26px;
      font-weight: 700;
      font-family: Georgia, serif;
      color: var(--gold)
    }

    .stl {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-top: 3px
    }

    .rkr {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 0;
      border-bottom: 1px solid var(--bdr)
    }

    .rkp {
      font-size: 15px;
      font-weight: 700;
      font-family: Georgia, serif;
      min-width: 34px;
      text-align: center
    }

    .skip-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 16px 14px;
      background: linear-gradient(0deg, var(--bg) 70%, transparent);
      display: flex;
      justify-content: center;
      z-index: 9
    }

    .logo-wrap {
      text-align: center;
      padding: 32px 0 24px
    }

    .logo-cross {
      font-size: 46px;
      color: var(--gold);
      text-shadow: 0 0 26px rgba(200, 168, 75, .45);
      display: block;
      margin-bottom: 9px
    }

    /* ─── ADMIN ─────────────────────────────────────────────────── */
    .admin-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .admin-nav {
      background: var(--card);
      border-bottom: 1px solid var(--bdr);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 20
    }

    .admin-nav-logo {
      font-family: Georgia, serif;
      color: var(--gold);
      font-size: 18px;
      padding: 14px 8px 14px 0;
      margin-right: 8px;
      border-right: 1px solid var(--bdr);
      white-space: nowrap
    }

    .nav-tab {
      padding: 14px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--dim);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: var(--t);
      white-space: nowrap
    }

    .nav-tab:hover {
      color: var(--ice)
    }

    .nav-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold)
    }

    .nav-spacer {
      flex: 1
    }

    .admin-body {
      flex: 1;
      padding: 20px 16px 40px
    }

    .tbl-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border-radius: var(--rsm);
      border: 1px solid var(--bdr)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    thead {
      background: rgba(45, 24, 64, .5)
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
      white-space: nowrap
    }

    td {
      padding: 11px 14px;
      border-top: 1px solid var(--bdr);
      vertical-align: top;
      line-height: 1.5
    }

    tr:hover td {
      background: rgba(45, 24, 64, .25)
    }

    .td-q {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .td-actions {
      display: flex;
      gap: 6px;
      white-space: nowrap
    }

    /* Trilha card (admin) */
    .trilha-card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 18px;
      margin-bottom: 16px
    }

    .tema-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--bdr2);
      border-radius: 99px;
      font-size: 12px;
      margin: 3px;
      cursor: default
    }

    /* MODAL */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
      align-items: flex-start;
      justify-content: center
    }

    .modal-bg.open {
      display: flex
    }

    .modal-box {
      background: var(--card);
      border: 1px solid var(--bdr2);
      border-radius: var(--r);
      padding: 24px;
      width: 100%;
      max-width: 700px;
      box-shadow: var(--shadow);
      animation: fadeIn .2s ease
    }

    /* Trilha switcher */
    .trilha-tab {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid var(--bdr2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--dim);
      background: transparent;
      font-family: inherit;
      transition: var(--t)
    }

    .trilha-tab:hover {
      border-color: var(--gold);
      color: var(--ice)
    }

    .trilha-tab.active {
      border-color: var(--gold);
      background: rgba(200, 168, 75, .12);
      color: var(--gold)
    }

    .trilha-tab.locked {
      opacity: .4;
      cursor: not-allowed
    }

    /* SPINNER */
    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .spinner {
      border-radius: 50%;
      border-style: solid;
      border-color: rgba(200, 168, 75, .25);
      border-top-color: var(--gold);
      animation: spin .7s linear infinite
    }

    /* TOAST */
    .toast {
      pointer-events: auto;
      padding: 11px 18px;
      border-radius: var(--rsm);
      font-size: 13px;
      max-width: 90vw;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: .25s ease;
      box-shadow: var(--shadow)
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0)
    }

    .toast.tok {
      background: rgba(30, 107, 64, .92);
      border: 1px solid var(--okl);
      color: #86EFAC
    }

    .toast.terr {
      background: rgba(140, 21, 21, .92);
      border: 1px solid var(--err);
      color: #FCA5A5
    }

    .toast.tinfo {
      background: rgba(115, 24, 40, .92);
      border: 1px solid var(--wine);
      color: var(--gold)
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bdr2);
      border-radius: 3px
    }

    /* Tema rows dinâmicos no modal trilha */
    .tema-row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center
    }

    /* ── ÁREA SEGURA (iPhone notch / home bar) ────────────────── */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .skip-bar {
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
    }

    .qhdr {
      padding-top: calc(11px + env(safe-area-inset-top));
    }

    .admin-nav {
      padding-top: env(safe-area-inset-top);
    }

    /* ── MOBILE ≤ 600px ────────────────────────────────────────── */
    @media(max-width:600px) {

      /* layout geral */
      .row2, .row3 { grid-template-columns: 1fr }
      .card, .admin-body { padding: 14px }
      .ctr, .ctr-sm { padding: 0 12px }

      /* estatísticas */
      .stg { grid-template-columns: 1fr 1fr }

      /* cards de etapa — 2 colunas compactas */
      .sc { padding: 10px }
      .sc-ttl { font-size: 11px }
      .sc-ico { font-size: 14px; margin-bottom: 3px }

      /* quiz */
      .ans { font-size: 13px; padding: 11px 12px }
      .ans .ltr { min-width: 22px; height: 22px; font-size: 11px }
      .qhdr .ctr { padding: 0 12px }

      /* navbar admin — scroll horizontal */
      .admin-nav { overflow-x: auto; flex-wrap: nowrap; gap: 0 }
      .admin-nav-logo { font-size: 15px; padding: 12px 6px 12px 0; margin-right: 4px }
      .nav-tab { padding: 12px 10px; font-size: 12px; white-space: nowrap }

      /* tabelas admin — scroll */
      .tbl-wrap { font-size: 12px }
      td, th { padding: 8px 10px }
      .td-q { max-width: 160px }

      /* modais */
      .modal-bg { padding: 10px }
      .modal-box { padding: 18px; max-width: 100% !important }

      /* trilha card */
      .trilha-card { padding: 14px }

      /* tema-row */
      .tema-row { grid-template-columns: 36px 1fr }

      /* ranking */
      .rkr { gap: 8px }
      .rkp { min-width: 28px; font-size: 13px }

      /* resultado */
      .stv { font-size: 20px }
    }

    /* ── MOBILE ≤ 400px (telas pequenas) ─────────────────────── */
    @media(max-width:400px) {
      .btn { padding: 9px 14px; font-size: 13px }
      .btn-gold[style*="font-size:15px"] { font-size: 14px !important }
      .serif[style*="font-size:28px"] { font-size: 22px !important }
      .qval { font-size: 11px }
    }

    /* ─── MATERIAL DE ESTUDO ─────────────────────────────────── */
    .ms-wrap {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--ice);
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 0 60px
    }

    .ms-cover {
      text-align: center;
      padding: 32px 0 28px;
      border-bottom: 2px solid var(--gold);
      margin-bottom: 32px
    }

    .ms-cover h1 {
      font-size: 28px;
      color: var(--gold);
      letter-spacing: .04em;
      margin-bottom: 6px
    }

    .ms-cover p {
      font-size: 13px;
      color: var(--dim);
      font-family: sans-serif
    }

    .ms-tema {
      margin-bottom: 44px
    }

    .ms-tema-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(115, 24, 40, .25);
      border-left: 4px solid var(--gold);
      border-radius: 0 var(--rsm) var(--rsm) 0;
      margin-bottom: 18px
    }

    .ms-tema-hdr .ico {
      font-size: 26px
    }

    .ms-tema-hdr h2 {
      font-size: 19px;
      color: var(--gold)
    }

    .ms-tema-hdr .num {
      font-size: 11px;
      color: var(--dim);
      font-family: sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .ms-sec {
      margin-bottom: 20px
    }

    .ms-sec h3 {
      font-size: 15px;
      color: var(--goldl);
      border-bottom: 1px solid var(--bdr);
      padding-bottom: 5px;
      margin-bottom: 10px;
      font-family: sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .ms-sec p {
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 10px;
      text-align: justify
    }

    .ms-sec ul,
    .ms-sec ol {
      padding-left: 20px;
      margin-bottom: 10px
    }

    .ms-sec li {
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 4px
    }

    .ms-sec li strong {
      color: var(--goldl)
    }

    .ms-sec .ref {
      font-size: 12px;
      color: var(--dim);
      font-family: sans-serif;
      font-style: italic;
      margin-top: 6px
    }

    .ms-box {
      background: rgba(200, 168, 75, .07);
      border: 1px solid rgba(200, 168, 75, .2);

      padding: 12px 16px;
      margin: 12px 0
    }

      margin-bottom: 0
    }

    .ms-dv {
      height: 1px;
      background: var(--bdr);
      margin: 28px 0
    }

    .ms-print-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100
    }

    @media print {
      body {
        background: #fff !important;
        color: #111 !important
      }

      #app>*:not(.ms-print-wrap) {
        display: none !important
      }

      .ms-print-wrap {
        display: block !important
      }

      .admin-nav,
      .ms-print-btn,
      .admin-body>*:not(.ms-print-wrap) {

        color: #111;
        max-width: 100%;

      }

      .ms-cover h1 {

      }

      .ms-tema-hdr {
        background: #f5e8cc;

      }

      }

        color: #777
      }

        border-color: #c8a84b
      }

        color: #777
      }

      }

      .ms-cover {
        border-bottom-color: #5B1A24

<body>
  <div id="app"></div>
  <div id="loading"
    style="display:none;position:fixed;inset:0;background:rgba(11,8,16,.88);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="spinner" style="width:34px;height:34px;border-width:3px"></div>
    <p style="color:var(--gold);font-size:13px;letter-spacing:.04em">Carregando...</p>
  </div>
  <div id="toasts"
    style="position:fixed;bottom:18px;left:0;right:0;z-index:9999;pointer-events:none;display:flex;flex-direction:column-reverse;align-items:center;gap:7px;padding:0 16px">
  </div>

  <!-- MODAL QUESTÃO -->
  <div id="qmodal" class="modal-bg" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2 class="serif" style="font-size:18px;margin-bottom:16px" id="modal-title">Adicionar Questão</h2>
      <div id="modal-err"></div>

      <div class="row2">
        <div class="fg">
          <label class="fl">Tema <span class="req">*</span></label>
          <select class="fi" id="mf-tema"></select>
        </div>
        <div class="fg">
          <label class="fl">Subtema / Categoria</label>
          <input class="fi" id="mf-theme" type="text" placeholder="Ex: Liturgia, Objetos Sagrados...">
        </div>
      </div>

      <div class="fg">
        <label class="fl">URL da Imagem <span class="dim" style="font-weight:400">(opcional — para questões com foto)</span></label>
        <input class="fi" id="mf-image" type="url" placeholder="https://upload.wikimedia.org/...">
      </div>

      <div class="fg">
        <label class="fl">Enunciado da Questão <span class="req">*</span></label>
        <textarea class="fi" id="mf-question" placeholder="Digite o enunciado completo da questão..."
          style="min-height:100px"></textarea>
      </div>

      <div class="dv" style="margin:10px 0"></div>
      <p class="dim" style="font-size:12px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">
        Alternativas</p>

      <div class="row2">
        <div class="fg"><label class="fl">A <span class="req">*</span></label><input class="fi" id="mf-a" type="text"
            placeholder="Alternativa A"></div>
        <div class="fg"><label class="fl">B <span class="req">*</span></label><input class="fi" id="mf-b" type="text"
            placeholder="Alternativa B"></div>
      </div>
      <div class="row2">
        <div class="fg"><label class="fl">C <span class="req">*</span></label><input class="fi" id="mf-c" type="text"
            placeholder="Alternativa C"></div>
        <div class="fg"><label class="fl">D <span class="req">*</span></label><input class="fi" id="mf-d" type="text"
            placeholder="Alternativa D"></div>
      </div>

      <div class="fg">
        <label class="fl">Resposta Correta <span class="req">*</span></label>
        <div style="display:flex;gap:12px;margin-top:4px" id="mf-answer-group">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-weight:600" id="ans-lbl-0">
            <input type="radio" name="mf_ans" value="0" style="accent-color:var(--gold)"> A
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-weight:600" id="ans-lbl-1">
            <input type="radio" name="mf_ans" value="1" style="accent-color:var(--gold)"> B
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-weight:600" id="ans-lbl-2">
            <input type="radio" name="mf_ans" value="2" style="accent-color:var(--gold)"> C
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-weight:600" id="ans-lbl-3">
            <input type="radio" name="mf_ans" value="3" style="accent-color:var(--gold)"> D
          </label>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Explicação / Catequese <span class="optional">(recomendado)</span></label>
        <textarea class="fi" id="mf-expl" placeholder="Breve explicação sobre a resposta correta..."
          style="min-height:80px"></textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-gold" id="modal-save-btn" onclick="saveQuestion()" style="min-width:140px">Salvar
          Questão</button>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR TEMA -->
  <div id="tmodal" class="modal-bg" onclick="closeTemaModal(event)">
    <div class="modal-box" style="max-width:480px" onclick="event.stopPropagation()">
      <h2 class="serif" style="font-size:18px;margin-bottom:16px" id="tmodal-title">Editar Tema</h2>
      <div id="tmodal-err"></div>
      <input type="hidden" id="tm-id">
      <div class="fg"><label class="fl">Ícone (emoji)</label>
        <input class="fi" id="tm-icon" type="text" maxlength="4" placeholder="Ex: ✝ 📅 💧">
      </div>
      <div class="fg"><label class="fl">Nome do Tema <span class="req">*</span></label>
        <input class="fi" id="tm-name" type="text" maxlength="80">
      </div>
      <div class="fg"><label class="fl">Descrição</label>
        <textarea class="fi" id="tm-desc" style="min-height:80px"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost" onclick="closeTemaModal()">Cancelar</button>
        <button class="btn btn-gold" onclick="saveTema()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL NOVA TRILHA -->
  <div id="ntmodal" class="modal-bg" onclick="closeNtModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h2 class="serif" style="font-size:18px;margin-bottom:4px">Nova Trilha</h2>
      <p class="dim" style="font-size:13px;margin-bottom:18px">Defina o nome da trilha e seus temas (até 10). As
        questões serão adicionadas depois.</p>
      <div id="ntmodal-err"></div>

      <div class="row2">
        <div class="fg">
          <label class="fl">Ícone (emoji)</label>
          <input class="fi" id="nt-icon" type="text" maxlength="4" placeholder="🎯">
        </div>
        <div class="fg">
          <label class="fl">Nome da Trilha <span class="req">*</span></label>
          <input class="fi" id="nt-name" type="text" maxlength="80" placeholder="Ex: Aprofundamento da Fé">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Descrição</label>
        <input class="fi" id="nt-desc" type="text" maxlength="200" placeholder="Breve descrição da trilha...">
      </div>

      <div class="dv"></div>
      <p class="dim" style="font-size:12px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Temas desta
        Trilha</p>
      <div id="nt-temas-list"></div>
      <button class="btn btn-ghost btn-sm" onclick="addTemaRow()" style="margin-top:6px">+ Adicionar Tema</button>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
        <button class="btn btn-ghost" onclick="closeNtModal()">Cancelar</button>
        <button class="btn btn-gold" id="nt-save-btn" onclick="saveTrilha()" style="min-width:140px">Criar
          Trilha</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // CONSTANTES DO JOGO
    // ═══════════════════════════════════════════════════════════
    const QPE = 10;   // Questões por etapa (tema)
    const SKIP_PEN = 10;
    const BASE_VAL = 10;
    const PASS_THR = 50;
    const LETTERS = ['A', 'B', 'C', 'D'];

    const ROLES = [
      { v: 'coroinha', l: 'Coroinha' }, { v: 'acolito', l: 'Acólito' }, { v: 'leitor', l: 'Leitor(a)' },
      { v: 'min_euc', l: 'Ministro(a) da Eucaristia' }, { v: 'catequista', l: 'Catequista' },
      { v: 'coord_lit', l: 'Coordenador(a) de Liturgia' }, { v: 'coro', l: 'Coro / Cantor(a)' },
      { v: 'conselho', l: 'Conselho Pastoral' }, { v: 'monitor', l: 'Monitor(a) / Formador(a)' },
      { v: 'outro', l: 'Outra Função na Igreja' },
    ];
    function roleLabel(r, c) { if (r === 'outro' && c) return c; return ROLES.find(x => x.v === r)?.l || r || '—' }

    const DEMO_Q = [
      { id: 'd1', theme: 'Objetos Sagrados', question: 'Qual é o nome do vaso sagrado utilizado na Missa para conter o vinho que, após a Consagração, se torna o Sangue de Cristo?', opts: ['Píxide', 'Cálice', 'Ostensório', 'Âmbula'], ans: 1, exp: 'O <strong>Cálice</strong> é o vaso litúrgico que contém o vinho transformado no precioso Sangue de Cristo.' },
      { id: 'd2', theme: 'Liturgia', question: 'O que é o Turíbulo, objeto presente nas celebrações solenes?', opts: ['O livro das orações da Missa', 'O recipiente das hóstias consagradas', 'O incensário onde se queima o incenso', 'A toalha que cobre o altar'], ans: 2, exp: 'O <strong>Turíbulo</strong> é usado para queimar incenso. O coroinha responsável chama-se turiferário.' },
      { id: 'd3', theme: 'Tempos Litúrgicos', question: 'Qual tempo litúrgico prepara a Igreja para o Natal, marcado pela cor roxa?', opts: ['Quaresma', 'Pentecostes', 'Advento', 'Tempo Comum'], ans: 2, exp: 'O <strong>Advento</strong> é o tempo de preparação para o Natal.' },
    ];

    // ═══════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════════
    const S = {
      screen: 'login',
      token: localStorage.getItem('dsa_token'),
      user: JSON.parse(localStorage.getItem('dsa_user') || 'null'),
      progress: [],
      rankData: [],
      trilhas: [],
      trilha: null,   // trilha selecionada (com temas embutidos)
      stageIdx: 0,
      quiz: null,
      result: null,
      adm: {
        tab: 'questions',
        trilhas: [],
        temas: [],
        selTema: null,
        questions: [],
        total: 0,
        pages: 1,
        page: 1,
        stats: null,
        editingQ: null,
      }
    };

    // ═══════════════════════════════════════════════════════════
    // URL BASE DA API
    // Em produção (Hostinger): aponta para o backend no Render.com
    // Em dev local: string vazia = mesma origem (localhost:3000)
    // ═══════════════════════════════════════════════════════════
    const API_BASE = window.location.hostname === 'dsa.servidoresdoaltar.site'
      ? 'https://dsa-api-5m8a.onrender.com'
      : '';

    // ═══════════════════════════════════════════════════════════
    // API HELPER
    // ═══════════════════════════════════════════════════════════
    async function api(method, path, body) {
      const h = { 'Content-Type': 'application/json' };
      if (S.token) h['Authorization'] = 'Bearer ' + S.token;
      const res = await fetch(API_BASE + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
      return data;
    }

    // ═══════════════════════════════════════════════════════════
    // AUTH
    // ═══════════════════════════════════════════════════════════
    function setAuth(token, user) {
      S.token = token; S.user = user;
      localStorage.setItem('dsa_token', token);
      localStorage.setItem('dsa_user', JSON.stringify(user));
    }
    function clearAuth() {
      S.token = null; S.user = null;
      localStorage.removeItem('dsa_token');
      localStorage.removeItem('dsa_user');
    }

    // ═══════════════════════════════════════════════════════════
    // LOADING & TOAST
    // ═══════════════════════════════════════════════════════════
    function showLoad() { document.getElementById('loading').style.display = 'flex' }
    function hideLoad() { document.getElementById('loading').style.display = 'none' }

    function toast(msg, type = 'tinfo', ms = 3200) {
      const el = document.createElement('div');
      el.className = `toast ${type}`; el.innerHTML = msg;
      document.getElementById('toasts').appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
      setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300) }, ms);
    }
    function showErr(el, msg) {
      if (typeof el === 'string') el = document.getElementById(el);
      if (el) el.innerHTML = `<div class="form-err">${msg}</div>`;
    }

    // ═══════════════════════════════════════════════════════════
    // NAVEGAÇÃO
    // ═══════════════════════════════════════════════════════════
    async function go(scr) {
      stopTimer();
      try {
        if (scr === 'dashboard') {
          showLoad();
          const trilhas = await api('GET', '/api/trilhas');
          S.progress = loadLocalProgress();
          S.trilhas  = trilhas;
          if (!S.trilha || !trilhas.find(t => t._id === S.trilha._id)) {
            S.trilha = trilhas.find(t => !isTrilhaComplete(t, S.progress)) || trilhas[0] || null;
          } else {
            S.trilha = trilhas.find(t => t._id === S.trilha._id) || trilhas[0];
          }
          hideLoad();
        }
        if (scr === 'admin') { showLoad(); await admLoad(); hideLoad(); }
      } catch (e) {
        hideLoad();
        toast(e.message, 'terr');
      }
      S.screen = scr; render(); window.scrollTo(0, 0);
    }

    function logout() { clearAuth(); S.screen = 'dashboard'; init(); }

    function isTrilhaComplete(trilha, progress) {
      const temas = trilha.temas || [];
      return temas.every((_, i) => {
        const p = progress.find(p => p.trilha_id === trilha._id && p.tema_index === i);
        return p && p.completed;
      });
    }

    // ═══════════════════════════════════════════════════════════
    // HELPERS DE PROGRESSO
    // ═══════════════════════════════════════════════════════════
    function getProgT(trilhaId, temaIndex) {
      return S.progress.find(p => p.trilha_id === trilhaId && p.tema_index === temaIndex)
        || { completed: 0, score: 0, first_attempt_rate: 0, time_seconds: 0 };
    }
    function totalScore() { return S.progress.filter(p => p.completed).reduce((s, p) => s + p.score, 0) }
    function totalTime() { return S.progress.filter(p => p.completed).reduce((s, p) => s + p.time_seconds, 0) }
    function doneCount() {
      if (!S.trilha) return 0;
      return S.progress.filter(p => p.completed && p.trilha_id === S.trilha._id).length;
    }

    // ═══════════════════════════════════════════════════════════
    // QUIZ
    // ═══════════════════════════════════════════════════════════
    function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; }
    function fmtTime(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0') }

    async function startStage(idx) {
      showLoad();
      const trilha = S.trilha;
      const temaId = trilha?.temaIds?.[idx];
      let qs;
      try {
        if (temaId) {
          const remote = await api('GET', `/api/quiz/${temaId}`);
          if (remote.length > 0) {
            qs = remote.map(q => ({ id: q.id, theme: q.theme, question: q.question, opts: q.options, ans: q.answer, exp: q.explanation, image: q.image || null }));
          }
        }
      } catch (_) { }
      if (!qs || !qs.length) qs = shuffle(DEMO_Q).slice(0, Math.min(QPE, DEMO_Q.length));
      hideLoad();

      S.stageIdx = idx;
      S.quiz = {
        idx, qs, ci: 0, val: BASE_VAL, attempts: 0,
        score: 0, fa: 0, timer: 0, iv: null,
        phase: 'q', lastWrong: -1, wrongTO: null
      };
      S.screen = 'quiz'; render(); window.scrollTo(0, 0);
      startTimer();
    }

    function startTimer() {
      if (S.quiz.iv) clearInterval(S.quiz.iv);
      S.quiz.iv = setInterval(() => {
        S.quiz.timer++;
        const el = document.getElementById('qtimer');
        if (el) el.textContent = fmtTime(S.quiz.timer);
      }, 1000);
    }
    function stopTimer() { if (S.quiz?.iv) { clearInterval(S.quiz.iv); S.quiz.iv = null; } }

    function pick(i) {
      const q = S.quiz; if (q.phase === 'ok') return;
      const cur = q.qs[q.ci];
      if (i === cur.ans) {
        q.phase = 'ok'; if (q.attempts === 0) q.fa++; q.score += q.val; qUpdate();
      } else {
        if (q.wrongTO) clearTimeout(q.wrongTO);
        q.phase = 'err'; q.attempts++; q.lastWrong = i;
        q.val = Math.max(0, BASE_VAL - q.attempts); qUpdate();
        q.wrongTO = setTimeout(() => { if (S.quiz?.phase === 'err' && S.screen === 'quiz') { S.quiz.phase = 'q'; qUpdate(); } }, 1600);
      }
    }
    function skip() { const q = S.quiz; if (q.phase === 'ok') return; if (q.wrongTO) { clearTimeout(q.wrongTO); q.wrongTO = null; } q.score -= SKIP_PEN; advance(); }

    function advance() {
      const q = S.quiz; q.val = BASE_VAL; q.attempts = 0; q.lastWrong = -1; q.phase = 'q'; q.wrongTO = null; q.ci++;
      if (q.ci >= q.qs.length) endStage(); else { qUpdate(); window.scrollTo(0, 0); }

      stopTimer(); const q = S.quiz;

      if (passed) {
        // Salva progresso localmente (sem login necessário)
        S.progress = saveLocalProgress(S.trilha._id, q.idx, {
          score: q.score, first_attempt_rate: far,
          time_seconds: q.timer, completed: 1
        });
      }
      S.screen = 'stageEnd'; render(); window.scrollTo(0, 0);
    }

      const el = document.getElementById('qinner'); if (el) el.innerHTML = qInner();
      const se = document.getElementById('qscore'); if (se) se.textContent = S.quiz.score + ' pts';
      const pf = document.getElementById('qprog'); if (pf) pf.style.width = (S.quiz.ci / S.quiz.qs.length * 100) + '%';
    }

    function rQuiz() {

</div></div></div>
<div class="ctr" style="flex:1;padding-top:16px;padding-bottom:calc(78px + env(safe-area-inset-bottom))">
<div id="qinner">${qInner()}</div></div>

⏭ Pular Questão &nbsp;<span style="opacity:.7">(-${SKIP_PEN} pts)</span></button>

    }

    // Remove referências bíblicas e citações entre parênteses das alternativas
    // para evitar que sirvam de dica (ex: "A parábola do filho pródigo (Lc 15,11-32)")
    function stripRef(text) {
      return text.replace(/\s*\([^)]*\d+[,:]\d[^)]*\)/g, '').trim();
    }

    function qInner() {
      const q = S.quiz, cur = q.qs[q.ci];

      // Garante ordem embaralhada estável por questão (recalcula apenas quando muda de questão)
      if (!q._shuffleMap || q._shuffleFor !== q.ci) {
        const map = [0, 1, 2, 3];
        for (let i = 3; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[map[i], map[j]] = [map[j], map[i]]; }
        q._shuffleMap = map;   // map[displayPos] = originalIndex
        q._reverseMap = map.reduce((r, orig, disp) => { r[orig] = disp; return r }, {});
        q._shuffleFor = q.ci;
      }
      const map = q._shuffleMap, rev = q._reverseMap;

      let opts = '';
      map.forEach((origIdx, dispIdx) => {
        const o = cur.opts[origIdx];
        let cls = 'ans', dis = '';
        if (q.phase === 'ok') { if (origIdx === cur.ans) cls += ' correct'; else cls += ' dimmed'; dis = 'disabled'; }
        else if (q.phase === 'err') { if (origIdx === q.lastWrong) cls += ' wrong'; dis = 'disabled'; }
        opts += `<button class="${cls}" ${dis} onclick="pick(${origIdx})"><span class="ltr">${LETTERS[dispIdx]}</span><span>${stripRef(o)}</span></button>`;
      });
      let fb = '';
      if (q.phase === 'err') { fb = `<div class="fb err">✗ &nbsp;Resposta incorreta! <strong>Tente novamente — vale ${q.val} pt${q.val !== 1 ? 's' : ''}.</strong></div>`; }
      else if (q.phase === 'ok') {
        const last = q.ci >= q.qs.length - 1;
        fb = `<div class="fb ok"><strong>✓ Correto! +${q.val} pt${q.val !== 1 ? 's' : ''}!</strong>
<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(74,222,128,.25);font-family:Georgia,'Times New Roman',serif;font-size:15px;line-height:1.75;color:#D1FAE5;letter-spacing:.01em">${cur.exp}</div></div>
<div style="margin-top:13px"><button class="btn btn-gold btn-full" onclick="${last ? 'endStage()' : 'next()'}" style="font-size:15px;padding:13px">
${last ? '✝ Finalizar Etapa' : 'Próxima Questão →'}</button></div>`;
      }
      return `<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:11px">
<span class="badge bw">${cur.theme}</span><span class="qval">Vale ${q.val} pt${q.val !== 1 ? 's' : ''}</span></div>
<div class="card" style="margin-bottom:13px">
<p class="dim" style="font-size:10px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em">Questão ${q.ci + 1}</p>
${cur.image ? `<div style="text-align:center;margin-bottom:12px"><img src="${cur.image}" alt="Santo" style="max-width:100%;max-height:260px;border-radius:10px;object-fit:cover;border:1px solid var(--bdr)"></div>` : ''}
<p class="serif" style="font-size:16px;line-height:1.65">${cur.question}</p></div>
${opts}${fb}`;
    }

    function doSkip() {
      const q = S.quiz; if (q.phase === 'ok') return;
      const w = document.getElementById('skipwrap'); if (!w || w.dataset.c) return; w.dataset.c = '1';

</div>

<div class="ms-sec">
<h3>O que é a Liturgia</h3>
<p>A palavra <strong>liturgia</strong> vem do grego <em>leitourgia</em> ("obra do povo"). Na Igreja Católica, designa o culto oficial prestado a Deus pelo Corpo de Cristo (cabeça e membros). Toda liturgia é essencialmente ação do próprio Cristo exercida por seu Corpo que é a Igreja (CIC 1070).</p>
<p>A Constituição <em>Sacrosanctum Concilium</em> (Concílio Vaticano II, 1963) foi o documento fundante da reforma litúrgica moderna e estabelece que a liturgia é o <strong>cume e a fonte</strong> de toda a atividade da Igreja (SC 10).</p>
</div>

<div class="ms-sec">
<h3>A Santa Missa — Estrutura e Partes</h3>
<ul>
<li><strong>Ritos Iniciais:</strong> Procissão de entrada, Saudação, Ato Penitencial (Confiteor), Glória (exceto Advento e Quaresma), Oração Coleta.</li>
<li><strong>Liturgia da Palavra:</strong> 1ª Leitura (AT), Salmo Responsorial, 2ª Leitura (epístola — domingos/festas), Aclamação ao Evangelho (<em>Aleluia</em>), Evangelho, Homilia, Profissão de Fé (Credo), Oração dos Fiéis.</li>
<li><strong>Liturgia Eucarística:</strong> Apresentação dos dons, Oração sobre as Oferendas, Prefácio, Santo (Sanctus), Oração Eucarística (Consagração, Anamnese, Epiclese), Doxologia ("Por Cristo, com Cristo..."), Amém.</li>
<li><strong>Rito da Comunhão:</strong> Pai-Nosso, Rito da Paz, Frações do Pão (<em>Agnus Dei</em>), Comunhão, Oração após a Comunhão.</li>
<li><strong>Ritos Finais:</strong> Avisos, Bênção, Despedida (<em>Ite, missa est</em>).</li>
</ul>
</div>

<div class="ms-sec">
<h3>Ministérios e Funções no Altar</h3>
<ul>
<li><strong>Sacerdote (Celebrante):</strong> Preside a celebração in persona Christi.</li>
<li><strong>Diácono:</strong> Proclama o Evangelho, distribui a Eucaristia, serve no altar.</li>
<li><strong>Acólito (instituído):</strong> Ministério estável; auxilia o padre e o diácono.</li>
<li><strong>Coroinha / Servidor do Altar:</strong> Serviço litúrgico temporário; carrega cruz, castiçais, incensário, naveta, turíbulo.</li>
<li><strong>Leitor (instituído):</strong> Proclama as leituras (exceto o Evangelho).</li>
<li><strong>Ministro Extraordinário da Eucaristia:</strong> Distribui a Comunhão quando necessário.</li>
<li><strong>Turiferário:</strong> Coroinha responsável pelo turíbulo (incensário).</li>
<li><strong>Naviculário:</strong> Carrega a naveta (com a colherinha do incenso).</li>
<li><strong>Cruciferário:</strong> Porta a cruz processional.</li>
<li><strong>Ceroferários:</strong> Portam os castiçais.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Objetos e Vasos Sagrados</h3>
<ul>
<li><strong>Cálice:</strong> Vaso que contém o vinho (Sangue de Cristo após a Consagração). Deve ser de material nobre, interior dourado.</li>
<li><strong>Patena:</strong> Prato pequeno sobre o qual repousa a hóstia grande durante a Missa.</li>
<li><strong>Píxide (Cibório):</strong> Vaso em forma de cálice com tampa; contém as hóstias para os fiéis.</li>
<li><strong>Ostensório (Custódia):</strong> Peça em que a hóstia consagrada é exposta para adoração.</li>
<li><strong>Âmbula:</strong> Pequeno recipiente usado para levar a Comunhão a enfermos.</li>
<li><strong>Turíbulo:</strong> Incensário suspenso em correntes; queima incenso em sinal de oração e reverência.</li>
<li><strong>Naveta:</strong> Recipiente em forma de barco que guarda o incenso antes de ser colocado no turíbulo.</li>
<li><strong>Aspersório:</strong> Hissope — instrumento para aspergir água benta.</li>
<li><strong>Caldeirinha:</strong> Recipiente com água benta usado na aspersão.</li>
<li><strong>Véu Umeral:</strong> Véu largo usado pelo sacerdote para segurar o ostensório; representa reverência ao Santíssimo.</li>
<li><strong>Corporal:</strong> Pano branco sobre o altar onde se colocam o cálice e a patena.</li>
<li><strong>Purificador:</strong> Pequeno pano usado para limpar o cálice e a patena.</li>
<li><strong>Sanguinho:</strong> Pano branco para limpar os dedos do celebrante após a Comunhão.</li>
<li><strong>Missal Romano:</strong> Livro com todas as orações e ritos da Missa.</li>
<li><strong>Lecionário:</strong> Livro com as leituras bíblicas da Missa.</li>
<li><strong>Evangeliário:</strong> Livro que contém somente os Evangelhos; carregado em procissão.</li>
</ul>
</div>

<div class="ms-sec">
<h3>O Espaço Sagrado</h3>
<ul>
<li><strong>Nave:</strong> Parte central da Igreja onde ficam os fiéis.</li>
<li><strong>Presbitério / Santuário:</strong> Espaço elevado onde se realiza a celebração (altar, ambo, cadeira presidencial).</li>
<li><strong>Ábside:</strong> Parte semicircular no fundo da Igreja, onde fica o altar-mor nas igrejas tradicionais.</li>
<li><strong>Nártex:</strong> Vestíbulo ou entrada da Igreja (origem paleocristã).</li>
<li><strong>Altar:</strong> Mesa do Sacrifício; centro do presbitério; deve ser fixo e de pedra (IGMR 298-301).</li>
<li><strong>Ambo:</strong> Estante/púlpito de onde se proclamam as leituras e o Evangelho.</li>
<li><strong>Cadeira Presidencial:</strong> Sede do celebrante; símbolo de presidência da assembleia.</li>
<li><strong>Sacrário (Tabernáculo):</strong> Cofre sagrado onde ficam reservadas as hóstias consagradas.</li>
<li><strong>Sacristia:</strong> Sala adjacente à Igreja onde o celebrante e os ministros se paramentam.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Vestes Litúrgicas</h3>
<ul>
<li><strong>Alba:</strong> Veste branca comprida, símbolo do Batismo; usada por todos os ministros.</li>
<li><strong>Casula:</strong> Veste exterior do sacerdote na Missa (cor litúrgica do dia).</li>
<li><strong>Dalmática:</strong> Veste exterior do diácono na Missa.</li>
<li><strong>Estola:</strong> Faixa usada pelo sacerdote ao pescoço; pelo diácono, cruzada no ombro esquerdo. Símbolo do poder sacerdotal.</li>
<li><strong>Cíngulo:</strong> Cordão com que se cinge a alba.</li>
<li><strong>Pluvial (Capa de Asperges):</strong> Capa usada em procissões, Bênção do Santíssimo e outros ritos.</li>
<li><strong>Véu do Cálice:</strong> Cobre o cálice e a patena antes e depois da Missa.</li>
</ul>
<div class="ms-box"><p><strong>Cores litúrgicas:</strong> Branco/Dourado (festas do Senhor, Maria, santos não-mártires); Vermelho (Domingo de Ramos, Sexta-feira Santa, Pentecostes, festas de mártires e apóstolos); Verde (Tempo Comum); Roxo/Violeta (Advento, Quaresma, Missa de Réquiem); Rosa (3º Dom. Advento — Gaudete / 4º Dom. Quaresma — Laetare); Preto (opcional — Missa de Réquiem).</p></div>
</div>

<div class="ms-sec">
<h3>Gestos e Atitudes Litúrgicas</h3>
<ul>
<li><strong>Genuflexão:</strong> Dobrar o joelho direito até o chão — diante do Santíssimo exposto ou reservado no Sacrário.</li>
<li><strong>Inclinação profunda:</strong> Dobrar a cabeça e o corpo — diante do altar sem Sacrário.</li>
<li><strong>Prostração:</strong> Deitar no chão — Sexta-feira Santa e Ordenações.</li>
<li><strong>Imposição das mãos:</strong> Gesto de bênção, consagração e ordenação.</li>
<li><strong>Incensação:</strong> Sinal de oração, honra e consagração.</li>
</ul>
<p class="ref">Referências: CIC 1066-1209; IGMR (Instrução Geral do Missal Romano); Sacrosanctum Concilium.</p>
</div>
</div>

<div class="ms-sec">
<h3>O Ano Litúrgico</h3>
<p>O <strong>Ano Litúrgico</strong> é o ciclo anual pelo qual a Igreja celebra o Mistério Pascal de Cristo — sua Paixão, Morte, Ressurreição e Glorificação. Cada semana é uma "Páscoa semanal" e cada domingo é o "Dia do Senhor" (<em>Dies Domini</em>). O ano litúrgico começa no <strong>1º Domingo do Advento</strong> (quatro domingos antes do Natal) e termina no <strong>Solenidade de Cristo Rei</strong>.</p>
</div>

<div class="ms-sec">
<h3>Os Tempos Litúrgicos</h3>
<ul>
<li><strong>Advento (roxo/violeta):</strong> 4 semanas de preparação para o Natal. Espera e vigilância. O 3º domingo chama-se <em>Gaudete</em> (cor rosa). João Batista e Maria são figuras centrais.</li>
<li><strong>Natal (branco/dourado):</strong> Do Natal (25/dez) à festa do Batismo do Senhor. Inclui: Sagrada Família (1º dom. após Natal), Solenidade de Maria (1º jan.), Epifania (6 jan. / dom. próximo), Batismo do Senhor.</li>
<li><strong>Tempo Comum I (verde):</strong> Semanas entre o Batismo do Senhor e a Quarta-feira de Cinzas.</li>
<li><strong>Quaresma (roxo/violeta):</strong> 40 dias de penitência, conversão e preparação para a Páscoa. Começa na <em>Quarta-feira de Cinzas</em>. O 4º domingo chama-se <em>Laetare</em> (cor rosa). Não se canta Aleluia. A semana final é a <em>Semana Santa</em>.</li>
<li><strong>Tríduo Pascal:</strong> Ápice do ano litúrgico. Quinta-feira Santa (Missa da Ceia), Sexta-feira Santa (Celebração da Paixão), Sábado Santo (Vigília Pascal).</li>
<li><strong>Tempo Pascal (branco/dourado):</strong> 50 dias da Páscoa a Pentecostes. Inclui Ascensão (40º dia) e encerra-se em Pentecostes.</li>
<li><strong>Tempo Comum II (verde):</strong> Da segunda-feira após Pentecostes à solenidade de Cristo Rei. O último domingo do ano litúrgico é <strong>Cristo Rei do Universo</strong>.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Os Ciclos Litúrgicos</h3>
<ul>
<li><strong>Ciclo A:</strong> Evangelho de Mateus.</li>
<li><strong>Ciclo B:</strong> Evangelho de Marcos (com trechos de João 6).</li>
<li><strong>Ciclo C:</strong> Evangelho de Lucas.</li>
<li>O Evangelho de João é proclamado em períodos especiais (Quaresma, Páscoa, festas).</li>
<li>As leituras feriais (dias de semana) seguem os ciclos <strong>Ano I</strong> (anos ímpares) e <strong>Ano II</strong> (anos pares).</li>
</ul>
</div>

<div class="ms-sec">
<h3>Festas e Solenidades — Hierarquia</h3>
<ul>
<li><strong>Solenidade:</strong> Maior grau. Possui Vésperas próprias e, quando possível, Missa vespertina da véspera (ex.: Natal, Páscoa, Ascensão, Pentecostes, Assunção, Imaculada Conceição, São Pedro e Paulo, Todos os Santos).</li>
<li><strong>Festa:</strong> Nível intermediário (ex.: Transfiguração, Exaltação da Santa Cruz, Evangelistas).</li>
<li><strong>Memória obrigatória:</strong> Santos no calendário geral sem possibilidade de omissão.</li>
<li><strong>Memória facultativa:</strong> Pode ser substituída pela feria.</li>
</ul>
<div class="ms-box"><p><strong>Datas fixas essenciais:</strong> Natal (25/dez) · Epifania (6/jan) · São José (19/mar) · Anunciação (25/mar) · São João Batista (24/jun) · São Pedro e Paulo (29/jun) · Assunção (15/ago) · Todos os Santos (1/nov) · Imaculada Conceição (8/dez).</p></div>
</div>

<div class="ms-sec">
<h3>Semana Santa — Datas e Ritos</h3>
<ul>
<li><strong>Domingo de Ramos:</strong> Procissão com palmas; Paixão segundo Mateus/Marcos/Lucas.</li>
<li><strong>Quinta-feira Santa — Missa da Ceia do Senhor:</strong> Glória com repique de sinos (silenciam até a Vigília); Lavagem dos Pés (<em>mandatum</em>); Processão e Repouso do Santíssimo.</li>
<li><strong>Sexta-feira Santa:</strong> Não é Missa (ação litúrgica). Liturgia da Palavra → Adoração da Cruz → Comunhão (pré-santificada). Cor vermelha.</li>
<li><strong>Sábado Santo — Vigília Pascal:</strong> "Mãe de todas as vigílias" (S. Agostinho). Quatro partes: Serviço da Luz (Exsultet), Liturgia da Palavra (7 leituras do AT + epístola + Evangelho), Liturgia Batismal, Liturgia Eucarística.</li>
<li><strong>Domingo de Páscoa:</strong> "Domingo in albis" — oitava da Páscoa. Os neófitos vestem alva branca durante os oito dias.</li>
</ul>
<p class="ref">Referências: Sacrosanctum Concilium; Normas Universais sobre o Ano Litúrgico e o Calendário (NUALC).</p>
</div>
</div>

<!-- TEMA 3 -->

<div class="ms-tema">
<div class="ms-tema-hdr">
  <span class="ico">💧</span>
  <div><div class="num">Tema 3 de 10</div><h2>Sacramentos e Sacramentais</h2></div>
</div>

<div class="ms-sec">
<h3>O que são os Sacramentos</h3>
<p>Os sacramentos são <strong>sinais eficazes da graça, instituídos por Cristo e confiados à Igreja</strong>, pelos quais nos é dispensada a vida divina (CIC 1131). Eles produzem o que significam (<em>ex opere operato</em>). São sete ao total.</p>
</div>

<div class="ms-sec">
<h3>Os Sete Sacramentos</h3>
<ol>
<li><strong>Batismo:</strong> Porta de entrada na Igreja. Matéria: água. Forma: "Eu te batizo em nome do Pai, do Filho e do Espírito Santo." Apaga o pecado original. Imprime caráter indelével. Ministro ordinário: sacerdote/diácono; em perigo de morte: qualquer pessoa.</li>
<li><strong>Confirmação (Crisma):</strong> Plenitude do Batismo; dom do Espírito Santo. Matéria: óleo do Crisma (consagrado pelo bispo na Quinta-feira Santa). Ministro ordinário: bispo.</li>
<li><strong>Eucaristia:</strong> "Sacramento dos sacramentos." Corpo e Sangue de Cristo sob espécies de pão e vinho. Transsubstanciação. Ministro: sacerdote validamente ordenado.</li>
<li><strong>Penitência (Reconciliação):</strong> Matéria: atos do penitente (contrição, confissão, satisfação). Forma: palavras de absolvição ("Eu te absolvo dos teus pecados..."). Ministro: sacerdote com jurisdição.</li>
<li><strong>Unção dos Enfermos:</strong> Unção com óleo dos enfermos (bênto pelo bispo). Para doentes em perigo; não exige iminência da morte. Ministro: sacerdote.</li>
<li><strong>Ordem:</strong> Três graus: episcopado (plenitude), presbiterado, diaconato. Imprime caráter indelével. Só homens batizados.</li>
<li><strong>Matrimônio:</strong> Os cônjuges são ministros um do outro (na tradição latina). Indissolúvel e fiel. Aberto à vida.</li>
</ol>
<div class="ms-box"><p><strong>Sacramentos que imprimem caráter (não se repetem):</strong> Batismo, Confirmação, Ordem.</p></div>
</div>

<div class="ms-sec">
<h3>Sacramentais</h3>
<p>Os <strong>sacramentais</strong> são sinais sagrados instituídos pela Igreja (não por Cristo diretamente) que nos dispõem a receber a graça e santificam diversas circunstâncias da vida (CIC 1677). Exemplos:</p>
<ul>
<li><strong>Água benta:</strong> Lembra o Batismo; purifica e afasta o mal.</li>
<li><strong>Cinzas:</strong> Imposição na Quarta-feira de Cinzas — "Lembra-te que és pó..."</li>
<li><strong>Palmas:</strong> Domingo de Ramos.</li>
<li><strong>Bênção dos objetos:</strong> Crucifixos, terços, imagens.</li>
<li><strong>Óleo dos catecúmenos:</strong> Unge catecúmenos antes do Batismo.</li>
<li><strong>Exorcismo:</strong> Rito que implora a libertação do poder do maligno.</li>
<li><strong>Escápula, medalhas, crucifixos:</strong> Objetos de piedade.</li>
</ul>
</div>

<div class="ms-sec">
<h3>A Eucaristia — Aprofundamento</h3>
<ul>
<li><strong>Transsubstanciação:</strong> Conversão substancial do pão e vinho no Corpo e Sangue de Cristo, permanecendo os acidentes (aparência) inalterados (DS 1651).</li>
<li><strong>Presença real:</strong> Cristo está presente inteiro em cada espécie e em qualquer parte das espécies.</li>
<li><strong>Comunhão sob as duas espécies:</strong> Já presente na instituição da Eucaristia (Última Ceia).</li>
<li><strong>Adoração eucarística:</strong> A hóstia consagrada merece adoração de latria (a Deus devida).</li>
<li><strong>Viaticum:</strong> Última Comunhão antes da morte; preparação para a passagem.</li>
<li><strong>Jejum eucarístico:</strong> Uma hora antes da Comunhão (exceto doentes e seus cuidadores).</li>
</ul>
<p class="ref">Referências: CIC 1113-1666; Catecismo CIC §§ 1210-1690; Enc. Ecclesia de Eucharistia (JP II, 2003).</p>
</div>
</div>

<!-- TEMA 4 -->
<!-- ══════════════════════════════════════════════════════════ -->
<div class="ms-tema">
<div class="ms-tema-hdr">
  <span class="ico">📖</span>
  <div><div class="num">Tema 4 de 10</div><h2>Doutrina e Dogmas</h2></div>
</div>

<div class="ms-sec">
<h3>Dogma e Doutrina</h3>
<p>Um <strong>dogma</strong> é uma verdade revelada por Deus, definida solenemente pela Igreja e proposta à fé dos fiéis como obrigatória. A negação de um dogma é heresia. A <strong>doutrina</strong> é o conjunto de ensinamentos da Igreja (magistério ordinário e extraordinário).</p>
</div>

<div class="ms-sec">
<h3>A Santíssima Trindade</h3>
<p>O mistério central da fé cristã: <strong>um único Deus em três Pessoas distintas</strong> — Pai, Filho e Espírito Santo. Cada Pessoa é plenamente Deus; as três Pessoas são distintas mas consubstanciais (<em>homoousios</em>). Definido no Concílio de Niceia (325) e Constantinopla I (381). O Símbolo Niceno-Constantinopolitano (Credo) expressa esta fé.</p>
</div>

<div class="ms-sec">
<h3>A Encarnação e os Grandes Concílios</h3>
<ul>
<li><strong>Niceia I (325):</strong> Definiu a divindade do Filho (contra Arianismo). "Deus de Deus, Luz da Luz, Deus verdadeiro de Deus verdadeiro."</li>
<li><strong>Constantinopla I (381):</strong> Divindade do Espírito Santo (contra Macedonianismo).</li>
<li><strong>Éfeso (431):</strong> Maria é <em>Theotokos</em> (Mãe de Deus). Cristo é uma só Pessoa (contra Nestorianismo).</li>
<li><strong>Calcedônia (451):</strong> Cristo tem duas naturezas (divina e humana), unidas sem confusão, separação, mistura ou divisão (contra Monofisismo).</li>
<li><strong>Constantinopla II (553):</strong> Confirmou Calcedônia.</li>
<li><strong>Constantinopla III (681):</strong> Duas vontades em Cristo (contra Monoteletismo).</li>
<li><strong>Niceia II (787):</strong> Legitimidade da veneração de imagens (contra Iconoclasmo).</li>
</ul>
</div>

<div class="ms-sec">
<h3>Dogmas Marianos</h3>
<ul>
<li><strong>Mãe de Deus (Theotokos):</strong> Concílio de Éfeso (431).</li>
<li><strong>Virgindade perpétua de Maria:</strong> Antes, durante e após o parto.</li>
<li><strong>Imaculada Conceição:</strong> Definida por Pio IX na bula <em>Ineffabilis Deus</em> (1854). Maria foi preservada do pecado original desde o primeiro instante da sua concepção.</li>
<li><strong>Assunção:</strong> Definida por Pio XII na const. <em>Munificentissimus Deus</em> (1950). Maria foi assunta em corpo e alma ao céu.</li>
</ul>
</div>

<div class="ms-sec">
<h3>A Igreja — Natureza e Propriedades</h3>
<ul>
<li><strong>Una:</strong> Uma só fé, um só Batismo, um só Senhor (Ef 4,5). A unidade não exclui a diversidade de ritos.</li>
<li><strong>Santa:</strong> Cristo a santifica continuamente pelos sacramentos.</li>
<li><strong>Católica:</strong> Universal; destinada a todos os povos e tempos.</li>
<li><strong>Apostólica:</strong> Fundada sobre os apóstolos; sucessão apostólica ininterrupta.</li>
<li><strong>Infalibilidade papal:</strong> Definida no Concílio Vaticano I (1870): quando o papa fala <em>ex cathedra</em> sobre fé e moral, é infalível.</li>
<li><strong>Concílio Vaticano II (1962-1965):</strong> 21º Concílio Ecumênico; renovação pastoral; <em>Lumen Gentium</em> (sobre a Igreja), <em>Dei Verbum</em> (Revelação), <em>Gaudium et Spes</em> (Igreja no mundo), <em>Sacrosanctum Concilium</em> (Liturgia).</li>
</ul>
<p class="ref">Referências: CIC 185-1065; Catecismo §§ 185-1065; Documentos conciliares.</p>
</div>
</div>

<div class="ms-tema">
<div class="ms-tema-hdr">
  <span class="ico">⭐</span>
  <div><div class="num">Tema 5 de 10</div><h2>Vida dos Santos</h2></div>
</div>

<div class="ms-sec">
<h3>Santidade e Canonização</h3>
<p>A Igreja canoniza os santos após rigoroso processo: servo de Deus → venerável → beato (beatificação, geralmente requer 1 milagre) → santo (canonização, requer 2 milagres). Os santos são intercessores, não objetos de adoração (<em>latria</em>), mas de veneração (<em>dulia</em>); Maria recebe hiperdúlia.</p>
</div>

<div class="ms-sec">
<h3>Santos Fundamentais para Servidores do Altar</h3>
<ul>
<li><strong>São José (19 mar / 1 mai):</strong> Patrono da Igreja Universal, dos trabalhadores, dos pais de família. Esposo de Maria. Anunciado em sonho por anjo. Proclamado por Pio IX em 1870.</li>
<li><strong>São João Batista (24 jun — natividade / 29 ago — decapitação):</strong> Precursor de Cristo. "Diminuam os meus servos, e que Ele cresça" (Jo 3,30). Único santo (exceto Maria) com duas festas: nascimento e martírio.</li>
<li><strong>São Pedro (29 jun):</strong> Simão Pedro, pescador, chamado por Jesus. Primeiro papa. Mártir em Roma (crucificado de cabeça para baixo). Sua tumba está sob a Basílica de São Pedro.</li>
<li><strong>São Paulo (29 jun):</strong> Fariseu (Saulo), convertido na estrada de Damasco (At 9). Apóstolo dos gentios. 13 cartas no NT (10 certamente paulinas).</li>
<li><strong>São João Evangelista (27 dez):</strong> Apóstolo amado, único a não sofrer martírio. Escreveu o 4º Evangelho, 3 cartas e o Apocalipse.</li>
<li><strong>São Tarsício (15 ago):</strong> Mártir romano, patrono dos coroinhas e ministros da Eucaristia. Morreu defendendo a Eucaristia.</li>
<li><strong>Santo Estêvão (26 dez):</strong> Primeiro mártir cristão (<em>proto-mártir</em>). Diácono apedrejado.</li>
<li><strong>São Lourenço (10 ago):</strong> Arquidiácono de Roma; mártir assado na grelha.</li>
<li><strong>São Francisco de Assis (4 out):</strong> Fundador dos Franciscanos. Estigmas. "Instrumento da paz." Patrono da ecologia.</li>
<li><strong>Santo Inácio de Loyola (31 jul):</strong> Fundador dos Jesuítas (<em>Companhia de Jesus</em>, 1540). <em>Exercícios Espirituais</em>.</li>
<li><strong>São Domingos de Gusmão (8 ago):</strong> Fundador dos Dominicanos (Ordem dos Pregadores, 1216).</li>
<li><strong>São Bento (11 jul):</strong> Pai do monaquismo ocidental. Regra de São Bento. Patrono da Europa.</li>
<li><strong>Santa Teresa d'Ávila (15 out):</strong> Doutora da Igreja; reformadora do Carmelo; <em>Castelo Interior</em>.</li>
<li><strong>Santa Teresinha do Menino Jesus (1 out):</strong> Doutora da Igreja; "pequeno caminho." Padroeira das missões.</li>
<li><strong>São Tomás de Aquino (28 jan):</strong> Doutor Angélico. <em>Summa Theologiae</em>. Patrono das escolas católicas.</li>
<li><strong>São Agostinho (28 ago):</strong> Bispo de Hipona. <em>Confissões</em>, <em>A Cidade de Deus</em>. Doutor da Igreja.</li>
<li><strong>São Jerônimo (30 set):</strong> Traduziu a Bíblia para o latim (<em>Vulgata</em>). "A ignorância das Escrituras é a ignorância de Cristo."</li>
<li><strong>Nossa Senhora (várias datas):</strong> Assunção (15/ago), Imaculada Conceição (8/dez), N. Sra. de Fátima (13/mai), N. Sra. de Guadalupe (12/dez), N. Sra. do Carmo (16/jul), N. Sra. Aparecida — padroeira do Brasil (12/out).</li>
</ul>
<p class="ref">Referências: Martyrologium Romanum; CIC 956-959; Lumen Gentium cap. VII-VIII.</p>
</div>
</div>

<div class="ms-tema">
<div class="ms-tema-hdr">
  <span class="ico">📜</span>
  <div><div class="num">Tema 6 de 10</div><h2>Sagradas Escrituras</h2></div>
</div>

<div class="ms-sec">
<h3>Inspiração e Cânon</h3>
<p>A Bíblia é a Palavra de Deus escrita sob inspiração do Espírito Santo por autores humanos que, usando suas faculdades e talentos, escreveram tudo e só o que Deus quis (DV 11). A <strong>inerrância</strong> refere-se às verdades necessárias para a salvação.</p>
<ul>
<li><strong>Bíblia Católica:</strong> 73 livros (46 AT + 27 NT). Os livros <em>deuterocanônicos</em> (Tobias, Judite, 1-2 Macabeus, Sabedoria, Eclesiástico, Baruc + trechos de Ester e Daniel) são aceitos pelos católicos mas rejeitados por protestantes.</li>
<li><strong>Bíblia Protestante:</strong> 66 livros (39 AT + 27 NT).</li>
<li><strong>Vulgata:</strong> Tradução latina de São Jerônimo (séc. IV-V); versão oficial da Igreja latina.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Antigo Testamento — Divisões</h3>
<ul>
<li><strong>Pentateuco / Torá (5):</strong> Gênesis, Êxodo, Levítico, Números, Deuteronômio.</li>
<li><strong>Livros Históricos (16):</strong> Josué, Juízes, Rute, 1-2 Samuel, 1-2 Reis, 1-2 Crônicas, Esdras, Neemias, Tobias, Judite, Ester, 1-2 Macabeus.</li>
<li><strong>Livros Sapienciais / Poéticos (7):</strong> Jó, Salmos, Provérbios, Eclesiastes, Cântico dos Cânticos, Sabedoria, Eclesiástico.</li>
<li><strong>Profetas Maiores (5):</strong> Isaías, Jeremias (+ Lamentações, Baruc), Ezequiel, Daniel.</li>
<li><strong>Profetas Menores (12):</strong> Oseias, Joel, Amós, Abdias, Jonas, Miquéias, Naum, Habacuc, Sofonias, Ageu, Zacarias, Malaquias.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Novo Testamento — Divisões</h3>
<ul>
<li><strong>Evangelhos (4):</strong> Mateus, Marcos, Lucas, João. Marcos é o mais antigo (~65 d.C.). Mateus, Marcos e Lucas são <em>sinóticos</em>.</li>
<li><strong>Atos dos Apóstolos (1):</strong> Lucas; história da Igreja primitiva e das missões de Paulo.</li>
<li><strong>Cartas Paulinas (13):</strong> Romanos, 1-2 Coríntios, Gálatas, Efésios, Filipenses, Colossenses, 1-2 Tessalonicenses, 1-2 Timóteo, Tito, Filemon.</li>
<li><strong>Carta aos Hebreus (1):</strong> Autoria debatida; relacionada à tradição paulina.</li>
<li><strong>Cartas Católicas (7):</strong> Tiago, 1-2 Pedro, 1-2-3 João, Judas.</li>
<li><strong>Apocalipse (1):</strong> João; literatura apocalíptica; revelação a João em Patmos.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Passagens e Versículos Essenciais</h3>
<ul>
<li><strong>Jo 3,16:</strong> "Porque Deus amou tanto o mundo que entregou o seu Filho Unigênito..."</li>
<li><strong>Mt 16,18:</strong> "Tu és Pedro, e sobre esta pedra edificarei a minha Igreja."</li>
<li><strong>Mt 28,19:</strong> Grande Mandato — "Ide e fazei discípulos de todos os povos..."</li>
<li><strong>Mc 16,15:</strong> "Ide por todo o mundo e proclamai o Evangelho a toda criatura."</li>
<li><strong>Lc 1,28:</strong> Anunciação — "Alegra-te, cheia de graça, o Senhor está contigo."</li>
<li><strong>Jo 1,1:</strong> "No princípio era o Verbo, o Verbo estava com Deus, e o Verbo era Deus."</li>
<li><strong>Jo 6,35:</strong> "Eu sou o pão da vida."</li>
<li><strong>Jo 20,22-23:</strong> Instituição do sacramento da Penitência — "Recebei o Espírito Santo. A quem perdoardes os pecados, serão perdoados..."</li>
<li><strong>1Cor 11,24-25:</strong> Palavras da Instituição da Eucaristia.</li>
<li><strong>Sl 22(23):</strong> "O Senhor é meu pastor, nada me falta."</li>
<li><strong>Sl 50(51):</strong> Miserere — salmo de arrependimento.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Leitura Bíblica — Métodos</h3>
<ul>
<li><strong>Sentido literal:</strong> O que o texto diz diretamente.</li>
<li><strong>Sentido alegórico/tipológico:</strong> O AT prefigura o NT (ex.: o maná = Eucaristia; o êxodo = redenção).</li>
<li><strong>Sentido moral/tropológico:</strong> Ensino para a ação reta.</li>
<li><strong>Sentido anagógico:</strong> Projeção para a eternidade/escatologia.</li>
<li><strong>Lectio Divina:</strong> Método espiritual: Lectio (ler) → Meditatio (meditar) → Oratio (orar) → Contemplatio (contemplar).</li>
</ul>
<p class="ref">Referências: Dei Verbum (CV II); CIC 101-141; Catecismo §§ 101-141.</p>
</div>
</div>

<div class="ms-tema">
<div class="ms-tema-hdr">
  <span class="ico">🏛</span>
  <div><div class="num">Tema 7 de 10</div><h2>História da Igreja</h2></div>
</div>

<div class="ms-sec">
<h3>Igreja Primitiva (séc. I–III)</h3>
<ul>
<li><strong>Pentecostes (33 d.C.):</strong> Nascimento da Igreja; descida do Espírito Santo; 3.000 batismos (At 2).</li>
<li><strong>Perseguições romanas:</strong> Nero (64), Domiciano (81-96), Décio (250-251), Diocleciano (303-311). Cristãos mortos no Coliseu.</li>
<li><strong>Édito de Milão (313):</strong> Constantino e Licínio concedem liberdade religiosa ao Império.</li>
<li><strong>Concílio de Niceia (325):</strong> Primeiro Concílio Ecumênico; convocado por Constantino.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Igreja Medieval (séc. V–XV)</h3>
<ul>
<li><strong>São Bento e o monaquismo ocidental (séc. VI):</strong> Mosteiros como centros de cultura, evangelização e preservação do saber.</li>
<li><strong>Evangelização dos bárbaros:</strong> Clóvis (rei franco batizado em 496); Bonifácio na Germânia; Cirilo e Metódio na Morávia (criaram o alfabeto glagolítico/cirílico).</li>
<li><strong>Cisma do Oriente (1054):</strong> Separação entre Roma e Constantinopla. Roma = Igreja Católica Romana; Constantinopla = Igreja Ortodoxa. Excomunhões mútuas (levantadas em 1964 por Paulo VI e Atenágoras).</li>
<li><strong>Cruzadas (1096-1291):</strong> Expedições militares para recuperar a Terra Santa dos muçulmanos. 8 cruzadas principais.</li>
<li><strong>Escolástica (séc. XII-XIII):</strong> Santo Tomás de Aquino, São Boaventura. Universidades como Paris, Bolonha, Oxford.</li>
<li><strong>Cisma do Ocidente (1378-1417):</strong> Dois (depois três) papas simultâneos. Resolvido no Concílio de Constança (1417).</li>
</ul>
</div>

<div class="ms-sec">
<h3>Reforma e Contra-Reforma (séc. XVI)</h3>
<ul>
<li><strong>Martinho Lutero (1517):</strong> Publicou as 95 teses em Wittenberg; início da Reforma Protestante. <em>Sola Scriptura, Sola Fide, Sola Gratia.</em></li>
<li><strong>Henrique VIII (1534):</strong> Criou a Igreja Anglicana ao separar-se de Roma.</li>
<li><strong>João Calvino:</strong> Reformador em Genebra; predestinação.</li>
<li><strong>Concílio de Trento (1545-1563):</strong> Contra-Reforma; definiu a doutrina sobre a Escritura e a Tradição, os sacramentos, a justificação, o purgatório, o culto aos santos.</li>
<li><strong>Companhia de Jesus — Jesuítas (1540):</strong> Inácio de Loyola; educação e missões.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Igreja Moderna e Contemporânea (séc. XIX–XX)</h3>
<ul>
<li><strong>Concílio Vaticano I (1869-1870):</strong> Definiu a infalibilidade papal e o primado jurisdicional do papa.</li>
<li><strong>Doutrina Social da Igreja:</strong> Inicia com a <em>Rerum Novarum</em> (Leão XIII, 1891) — questão operária.</li>
<li><strong>Concílio Vaticano II (1962-1965):</strong> João XXIII convocou; Paulo VI presidiu. Aggiornamento (atualização). 16 documentos: 4 Constituições, 9 Decretos, 3 Declarações.</li>
<li><strong>Papas recentes:</strong> Pio XII (1939-58) → João XXIII (1958-63, "o Papa Bom") → Paulo VI (1963-78) → João Paulo I (33 dias, 1978) → João Paulo II (1978-2005, santo canonizado em 2014) → Bento XVI (2005-2013, renunciou) → Francisco (2013-).</li>
</ul>
<p class="ref">Referências: CIC 748-962; Lumen Gentium; Catecismo §§ 748-975.</p>
</div>
</div>

  <div><div class="num">Tema 8 de 10</div><h2>Arte e Simbolismo Sacro</h2></div>
</div>

<div class="ms-sec">
<h3>A Arte a Serviço da Fé</h3>
<p>A arte sacra é uma expressão da fé que eleva a mente a Deus (SC 122). Não é mero ornamento: tem função catequética, litúrgica e doxológica. O Concílio Vaticano II pediu que a arte seja "digna, decorosa e bela" e esteja a serviço da assembleia celebrante.</p>
</div>

<div class="ms-sec">
<h3>Símbolos Cristãos Fundamentais</h3>
<ul>
<li><strong>Cruz:</strong> Símbolo central do Cristianismo; instrumento da redenção. Cruz latina (barra vertical mais longa), grega (barras iguais), de São Bento, da Ordem de Malta etc.</li>
<li><strong>Crucifixo:</strong> Cruz com a imagem de Cristo; mais usado no rito latino.</li>
<li><strong>Peixe (ICHTYS):</strong> Acrônimo grego: Ἰησοῦς Χριστός, Θεοῦ Υἱός, Σωτήρ (Jesus Cristo, Filho de Deus, Salvador). Símbolo dos cristãos primitivos.</li>
<li><strong>Chi-Rho (☧):</strong> Monograma de Cristo — primeiras letras do grego ΧΡΙΣΤΟΣ (Chi + Rho). Usado por Constantino.</li>
<li><strong>Alpha e Ômega (Α-Ω):</strong> Cristo é o princípio e o fim (Ap 1,8).</li>
<li><strong>IHS / IHC:</strong> Abreviação de IHSUS (Jesus) em grego ou <em>Iesus Hominum Salvator</em> (Jesus Salvador dos Homens).</li>
<li><strong>Pomba:</strong> Espírito Santo (Mt 3,16 — Batismo de Jesus).</li>
<li><strong>Cordeiro (Agnus Dei):</strong> Cristo como Cordeiro imolado (Jo 1,29; Ap 5).</li>
<li><strong>Pelicano:</strong> Símbolo eucarístico — a lenda diz que alimenta os filhotes com seu sangue.</li>
<li><strong>Âncora:</strong> Esperança cristã (Hb 6,19).</li>
<li><strong>Triângulo/Triqueta:</strong> Santíssima Trindade.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Símbolos dos Evangelistas</h3>
<ul>
<li><strong>Mateus:</strong> Anjo (homem alado) — começa com genealogia humana de Cristo.</li>
<li><strong>Marcos:</strong> Leão — começa com voz que clama no deserto.</li>
<li><strong>Lucas:</strong> Touro/boi — começa com o sacrifício de Zacarias no Templo.</li>
<li><strong>João:</strong> Águia — visão mais elevada e contemplativa da divindade de Cristo.</li>
</ul>
<div class="ms-box"><p>Baseados na visão de Ezequiel (Ez 1) e do Apocalipse (Ap 4). Chamados de <em>tetramorfos</em>.</p></div>
</div>

<div class="ms-sec">
<h3>Estilos Arquitetônicos das Igrejas</h3>
<ul>
<li><strong>Paleocristão (séc. I-IV):</strong> Catacumbas, basílicas romanas adaptadas.</li>
<li><strong>Bizântino (séc. IV-XV):</strong> Cúpulas, mosaicos. Ex.: Santa Sofia (Constantinopla), São Marcos (Veneza).</li>
<li><strong>Românico (séc. X-XII):</strong> Arcos semicirculares, paredes espessas, janelas pequenas. Ex.: Catedral de Worms.</li>
<li><strong>Gótico (séc. XII-XVI):</strong> Arcos ogivais, vitrais coloridos, torres elevadas, abóbadas. Ex.: Notre-Dame de Paris, Catedral de Colônia.</li>
<li><strong>Renascentista (séc. XV-XVI):</strong> Simetria clássica, cúpulas. Ex.: Basílica de São Pedro (Vaticano).</li>
<li><strong>Barroco (séc. XVII-XVIII):</strong> Ornamentação exuberante, movimento, luz dramática. Ex.: Gesù em Roma.</li>
<li><strong>Contemporâneo:</strong> Formas diversas; ênfase na assembleia participante.</li>
</ul>
</div>

<div class="ms-sec">
<h3>A Música Sacra</h3>
<ul>
<li><strong>Canto Gregoriano:</strong> "Canto próprio da liturgia romana" (SC 116). Monofônico, em latim, sem instrumentos.</li>
<li><strong>Polifonia clássica:</strong> Palestrina, Victoria, Lassus (séc. XVI). Aprovada pela Igreja após Trento.</li>
<li><strong>Órgão:</strong> "Rei dos instrumentos"; instrumento litúrgico por excelência da Igreja Ocidental (SC 120).</li>
<li><strong>Música litúrgica contemporânea:</strong> Deve ser digna, sagrada e bela; não deve imitar gêneros seculares de entretenimento.</li>
</ul>
<p class="ref">Referências: Sacrosanctum Concilium 112-130; Musica Sacra (Pio X, 1903); CIC 1159-1162.</p>
</div>
</div>
