</div>

<div class="ms-sec">
<h3>O que é a Oração</h3>
<p>A oração é a <strong>elevação da alma a Deus</strong> (São João Damasceno). É uma relação viva e pessoal com Deus. O CIC a define como "um relacionamento de aliança entre Deus e o homem em Cristo" (CIC 2564). A oração é indispensável à vida cristã.</p>
</div>

<div class="ms-sec">
<h3>Formas de Oração</h3>
<ul>
<li><strong>Vocal:</strong> Oração em palavras (Pai-Nosso, Ave-Maria, Credo, Atos de Contrição etc.).</li>
<li><strong>Meditação:</strong> Reflexão sobre a Palavra de Deus ou mistérios da fé; exercício mental.</li>
<li><strong>Contemplação:</strong> Silêncio amoroso diante de Deus; oração infusa; dom do Espírito.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Orações Fundamentais</h3>
<ul>
<li><strong>Pai-Nosso (Pater Noster):</strong> "A oração do Senhor" (Mt 6,9-13; Lc 11,2-4). Tem 7 pedidos: 3 de glorificação a Deus + 4 por necessidades humanas. Chamada de "oração perfeita."</li>
<li><strong>Ave-Maria:</strong> Combina a saudação do anjo Gabriel (Lc 1,28), a exclamação de Isabel (Lc 1,42) e a petição da Igreja.</li>
<li><strong>Glória ao Pai (Doxologia):</strong> Louvor à Trindade.</li>
<li><strong>Credo:</strong> Profissão de fé. Apostólico (12 artigos) ou Niceno-Constantinopolitano (Missa).</li>
<li><strong>Ato de Contrição:</strong> Expressão de arrependimento e propósito de emenda.</li>
<li><strong>Ângelus:</strong> Oração tres vezes ao dia (6h, 12h, 18h) lembrando a Encarnação. Na Páscoa substitui-se pelo Regina Caeli.</li>
</ul>
</div>

<div class="ms-sec">
<h3>O Rosário</h3>
<p>O Rosário é meditação dos mistérios de Cristo e de Maria, rezando Ave-Marias em dezenas. Tem <strong>20 mistérios</strong> (após acréscimo dos Luminosos por João Paulo II em 2002):</p>
<ul>
<li><strong>Gozosos (segunda e sábado):</strong> Anunciação, Visitação, Nascimento de Jesus, Apresentação, Encontro no Templo.</li>
<li><strong>Luminosos (quinta):</strong> Batismo no Jordão, Bodas de Caná, Proclamação do Reino, Transfiguração, Instituição da Eucaristia.</li>
<li><strong>Dolorosos (terça e sexta):</strong> Agonia, Flagelação, Coroação de Espinhos, Jesus carrega a Cruz, Crucifixão.</li>
<li><strong>Gloriosos (quarta e domingo):</strong> Ressurreição, Ascensão, Pentecostes, Assunção, Coroação de Maria.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Liturgia das Horas (Ofício Divino)</h3>
<p>A <strong>Liturgia das Horas</strong> é a oração pública oficial da Igreja ao longo do dia, santificando cada hora. Composta principalmente de Salmos, leituras bíblicas e hinos.</p>
<ul>
<li><strong>Ofício das Leituras:</strong> Em qualquer hora; leituras longas.</li>
<li><strong>Laudes:</strong> Oração da manhã.</li>
<li><strong>Horas Menores:</strong> Terça, Sexta e Nona (9h, 12h, 15h).</li>
<li><strong>Vésperas:</strong> Oração da tarde/noite; chamada de "segunda Missa do dia."</li>
<li><strong>Completas:</strong> Oração antes de dormir; termina com Salve Rainha ou outra antífona mariana.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Escolas de Espiritualidade</h3>
<ul>
<li><strong>Beneditina:</strong> Ora et Labora (ora e trabalha). Lectio Divina.</li>
<li><strong>Franciscana:</strong> Pobreza, fraternidade, contemplação da natureza.</li>
<li><strong>Dominicana:</strong> Estudo, pregação, contemplação (<em>contemplata aliis tradere</em>).</li>
<li><strong>Inaciana / Jesuíta:</strong> Discernimento espiritual, <em>Exercícios Espirituais</em>, encontrar Deus em todas as coisas.</li>
<li><strong>Carmelita:</strong> Contemplação, interioridade, noite escura da alma (São João da Cruz).</li>
<li><strong>Salesiana:</strong> São Francisco de Sales; espiritualidade no mundo ordinário; bondade e alegria.</li>
</ul>
<p class="ref">Referências: CIC 2558-2865; Catecismo §§ 2558-2865; Laudis Canticum (Paulo VI, 1970).</p>
</div>
</div>

  <div><div class="num">Tema 10 de 10</div><h2>Moral e Ética Cristã</h2></div>
</div>

<div class="ms-sec">
<h3>Fundamentos da Moral Cristã</h3>
<p>A moral cristã não é um conjunto de regras externas, mas a resposta de amor ao amor de Deus revelado em Cristo. A <strong>beatitude</strong> (felicidade eterna) é o fim último do homem. O agir moral é guiado pela razão iluminada pela fé, pela Lei Natural, pela Lei Revelada e pelo Magistério da Igreja.</p>
<p>A encíclica <strong>Veritatis Splendor</strong> (João Paulo II, 1993) trata dos fundamentos da moral católica, afirmando a existência de atos intrinsecamente maus (<em>intrinsece mala</em>), independentemente das intenções ou circunstâncias.</p>
</div>

<div class="ms-sec">
<h3>A Consciência Moral</h3>
<p>A consciência é o "julgamento da razão pelo qual a pessoa humana reconhece a qualidade moral de um ato concreto que vai praticar, está praticando ou praticou" (CIC 1778). Deve ser formada e educada. Nunca se deve agir contra a consciência, mas a consciência deve ser corretamente formada.</p>
<ul>
<li><strong>Consciência certa:</strong> Julga com firmeza e clareza.</li>
<li><strong>Consciência provável / duvidosa:</strong> Deve ser esclarecida antes de agir.</li>
<li><strong>Consciência errônea:</strong> Erra; pode ser invencível (sem culpa) ou vencível (com culpa).</li>
</ul>
</div>

<div class="ms-sec">
<h3>Virtudes e Vícios</h3>
<ul>
<li><strong>Virtudes Cardeais (naturais):</strong> Prudência, Justiça, Fortaleza, Temperança.</li>
<li><strong>Virtudes Teologais (infusas):</strong> Fé, Esperança, Caridade (1Cor 13). "A maior delas é a Caridade."</li>
<li><strong>Sete Pecados Capitais (vícios principais):</strong> Soberba, Avareza, Luxúria, Inveja, Gula, Ira, Preguiça (acídia). São "capitais" porque geram outros pecados.</li>
<li><strong>Sete Virtudes opostas:</strong> Humildade, Generosidade, Castidade, Caridade, Temperança, Paciência, Diligência.</li>
</ul>
</div>

<div class="ms-sec">
<h3>Os Dez Mandamentos (Decálogo)</h3>
<ol>
<li>Amarás a Deus sobre todas as coisas. (Proíbe idolatria, superstição, magia, ateísmo prático.)</li>
<li>Não tomarás o nome de Deus em vão. (Proíbe blasfêmia, perjúrio, palavrões com o nome de Deus.)</li>
<li>Guardarás o domingo e os dias santos. (Obriga à Missa dominical e ao descanso sagrado.)</li>
<li>Honrarás pai e mãe. (Família; respeito à autoridade legítima.)</li>
<li>Não matarás. (Protege a vida humana; proíbe aborto, eutanásia, suicídio, homicídio injusto.)</li>
<li>Não pecarás contra a castidade. (Pureza sexual; proíbe fornicação, pornografia, relações fora do casamento.)</li>
<li>Não furtarás. (Respeito à propriedade; proíbe roubo, fraude, corrupção.)</li>
<li>Não levantarás falso testemunho. (Verdade; proíbe mentira, calúnia, difamação.)</li>
<li>Não cobiçarás a mulher do próximo.</li>
<li>Não cobiçarás os bens alheios.</li>
</ol>
</div>

<div class="ms-sec">
<h3>Moral Sexual e Família</h3>
<p>A sexualidade humana é boa e criada por Deus; integra-se na pessoa para o amor conjugal e a procriação. A encíclica <strong>Humanae Vitae</strong> (Paulo VI, 1968) reafirmou a inseparabilidade dos sentidos unitivo e procriativo do ato conjugal, condenando a contracepção artificial. A <strong>Familiaris Consortio</strong> (João Paulo II, 1981) aprofunda a teologia do matrimônio.</p>
<ul>
<li><strong>Castidade:</strong> Virtude que integra a sexualidade na pessoa segundo a vocação de cada um.</li>
<li><strong>Matrimônio:</strong> Sacramento; indissolúvel, fiel, aberto à vida.</li>
<li><strong>Métodos naturais de regulação da fertilidade:</strong> Moralmente legítimos (NPF).</li>
</ul>
</div>

<div class="ms-sec">
<h3>Doutrina Social da Igreja (DSI)</h3>
<p>Conjunto de ensinamentos sobre a vida em sociedade à luz do Evangelho. Princípios:</p>
<ul>
<li><strong>Dignidade da pessoa humana:</strong> Fundamento de toda a DSI.</li>
<li><strong>Bem Comum:</strong> Conjunto de condições da vida social que permitem ao homem atingir sua perfeição.</li>
<li><strong>Subsidiariedade:</strong> O que pode ser feito pela instância menor não deve ser assumido pela maior.</li>
<li><strong>Solidariedade:</strong> "Todos somos responsáveis por todos" (JP II).</li>
<li><strong>Destino universal dos bens:</strong> Os bens da criação são destinados a todos.</li>
<li><strong>Opção preferencial pelos pobres.</strong></li>
</ul>
<div class="ms-box"><p><strong>Encíclicas sociais fundamentais:</strong> Rerum Novarum (Leão XIII, 1891) · Quadragesimo Anno (Pio XI, 1931) · Mater et Magistra (João XXIII, 1961) · Pacem in Terris (João XXIII, 1963) · Populorum Progressio (Paulo VI, 1967) · Laborem Exercens (JP II, 1981) · Centesimus Annus (JP II, 1991) · Caritas in Veritate (Bento XVI, 2009) · Laudato Si (Francisco, 2015) · Laudate Deum (Francisco, 2023).</p></div>
</div>

<div class="ms-sec">
<h3>Bioética Cristã e Escatologia</h3>
<ul>
<li><strong>Vida humana:</strong> Sagrada desde a concepção até a morte natural. Aborto e eutanásia são gravemente contrários à lei moral.</li>
<li><strong>Pena de morte:</strong> Francisco (2018) declarou inadmissível em todas as circunstâncias (CIC 2267 atualizado).</li>
<li><strong>Novíssimos (Escatologia):</strong> Morte → Juízo particular → Purgatório/Céu/Inferno → Parusia → Ressurreição dos mortos → Juízo final → Céu novo e Terra nova.</li>
<li><strong>Purgatório:</strong> Estado de purificação após a morte para os que morrem em graça mas necessitam purificação (CT 1030-1032).</li>
<li><strong>Indulgências:</strong> Remissão diante de Deus da pena temporal devida pelos pecados já perdoados. Plenária (total) ou parcial.</li>
</ul>
<p class="ref">Referências: CIC 1691-2557; Veritatis Splendor (1993); Humanae Vitae (1968); Compêndio da DSI (PCJP, 2004).</p>
</div>
</div>

    function studyChapter(icon, num, title, topics) {
      const rows = topics.map(([t, c]) => `
  <div class="study-topic" style="padding:13px 0;border-bottom:1px solid var(--bdr)">
    <p class="study-topic-title" style="font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">${t}</p>
    <p style="font-size:14px;line-height:1.8;color:var(--ice)">${c}</p>
  </div>`).join('');
      return `<div class="study-ch" style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:20px;overflow:hidden">
<div class="study-ch-hdr" style="background:linear-gradient(135deg,rgba(115,24,40,.6),rgba(45,24,64,.8));padding:16px 20px;display:flex;align-items:center;gap:12px">
  <span style="font-size:28px">${icon}</span>
  <div>
    <p style="font-size:10px;color:rgba(200,168,75,.7);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px">Tema ${num}</p>
    <h3 class="serif" style="font-size:18px;color:var(--gold)">${title}</h3>
  </div>
</div>
<div style="padding:4px 20px 10px">${rows}</div>
</div>`;
    }

    // ─── LOGIN DO ADMINISTRADOR (apenas suporte) ──────────────────
    function rAdminLogin() {
      return `<div class="screen" style="justify-content:center;align-items:center;padding:20px;background:radial-gradient(ellipse at top,rgba(115,24,40,.2) 0%,transparent 60%)">
<div class="ctr-sm">
<div class="logo-wrap"><span class="logo-cross serif">✝</span>
<h1 class="serif gold" style="font-size:20px;margin-bottom:4px">Painel de Suporte</h1>
<p class="dim" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase">Acesso Restrito</p></div>
<div class="card">
<div id="alerr"></div>
<div class="fg"><label class="fl">E-mail</label><input class="fi" id="al-e" type="email" placeholder="E-mail do suporte" autocomplete="email"></div>
<div class="fg"><label class="fl">Senha</label>
<div class="pw-wrap"><input class="fi" id="al-p" type="password" placeholder="Senha" autocomplete="current-password">
<button class="pw-eye" onclick="togglePwd('al-p')" type="button">👁</button></div></div>
<button class="btn btn-gold btn-full" id="al-btn" onclick="doAdminLogin()" style="font-size:15px;padding:13px">Entrar</button>
</div>
<div style="text-align:center;margin-top:16px">
<button class="btn-link" onclick="S.screen='dashboard';render()">← Voltar ao Desafio</button>
</div></div></div>`;
    }

    async function doAdminLogin() {
      const e = document.getElementById('al-e').value.trim(), p = document.getElementById('al-p').value;
      const err = document.getElementById('alerr'); err.innerHTML = '';
      if (!e || !p) { showErr(err, 'Preencha e-mail e senha.'); return; }
      const btn = document.getElementById('al-btn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> Entrando...';
      try {
        const d = await api('POST', '/api/auth/login', { email: e, password: p });
        if (d.user.role !== 'support') { showErr(err, 'Acesso restrito ao perfil de suporte.'); return; }
        setAuth(d.token, d.user);
        showLoad(); await admLoad(); hideLoad();
        S.screen = 'admin'; render();
      } catch (ex) { showErr(err, ex.message); }
      finally { btn.disabled = false; btn.innerHTML = 'Entrar'; }
    }

    function rAdmStats() {
      const a = S.adm, stats = a.stats || { byTema: {}, byTrilha: {}, total: 0 };
      const rows = a.temas.map(t => {
        const count = stats.byTema?.[t._id] || 0;
        const pct = Math.round(Math.min(100, count / 10 * 100));
        return `<tr>
<td><span style="font-size:18px">${t.icon || '✝'}</span></td>
<td><strong>${t.name}</strong></td>
<td style="text-align:center;font-weight:700;color:var(--gold)">${count}</td>
<td style="text-align:center"><span class="badge ${count >= 10 ? 'bo' : count > 0 ? 'bw' : 'be'}" style="font-size:10px">${count >= 10 ? '✓ OK' : count > 0 ? `${count}/10` : 'Vazio'}</span></td>
<td style="min-width:140px">
<div style="display:flex;align-items:center;gap:8px">
<div class="pt" style="flex:1"><div class="pf" style="width:${pct}%"></div></div>
<span class="dim" style="font-size:11px;white-space:nowrap">${pct}%</span>
</div></td>
</tr>`;
      }).join('');

      return `<div>
<h2 class="serif" style="font-size:18px;margin-bottom:6px">Estatísticas do Banco</h2>
<p class="dim" style="font-size:13px;margin-bottom:18px">Visão geral do preenchimento por tema.</p>
<div class="card" style="margin-bottom:16px">
<div style="display:flex;gap:24px;flex-wrap:wrap">
<div><p class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em">Total de Questões</p>
<p class="gold serif" style="font-size:36px;font-weight:700;line-height:1.1">${stats.total?.toLocaleString() || 0}</p></div>
<div><p class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em">Temas</p>
<p class="serif" style="font-size:36px;font-weight:700;line-height:1.1">${a.temas.length}</p></div>
<div><p class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em">Trilhas</p>
<p class="serif" style="font-size:36px;font-weight:700;line-height:1.1">${a.trilhas.length}</p></div>
</div></div>
<div class="tbl-wrap"><table>
<thead><tr><th style="width:36px"></th><th>Tema</th><th style="text-align:center">Questões</th><th style="text-align:center">Status</th><th style="min-width:180px">Preenchimento (meta: 10)</th></tr></thead>
<tbody>${rows}</tbody>
</table></div></div>`;
    }

    // ═══════════════════════════════════════════════════════════
    // ADMIN — CRUD QUESTÕES
    // ═══════════════════════════════════════════════════════════
    function openNewQ() {
      const a = S.adm;
      document.getElementById('modal-title').textContent = 'Adicionar Questão';
      document.getElementById('modal-err').innerHTML = '';
      document.getElementById('modal-save-btn').innerHTML = 'Salvar Questão';
      const sel = document.getElementById('mf-tema');
      sel.innerHTML = a.temas.map(t => `<option value="${t._id}" ${t._id === a.selTema ? 'selected' : ''}>${t.icon || '✝'} ${t.name}</option>`).join('');
      document.getElementById('mf-theme').value = '';
      document.getElementById('mf-image').value = '';
      document.getElementById('mf-question').value = '';
      ['a', 'b', 'c', 'd'].forEach(x => document.getElementById('mf-' + x).value = '');
      document.querySelectorAll('input[name="mf_ans"]').forEach(r => r.checked = false);
      document.getElementById('mf-expl').value = '';
      S.adm.editingQ = null;
      document.getElementById('qmodal').classList.add('open');
    }

    function openEditQ(id) {
      const q = S.adm.questions.find(x => x._id === id); if (!q) return;
      S.adm.editingQ = q;
      document.getElementById('modal-title').textContent = 'Editar Questão';
      document.getElementById('modal-err').innerHTML = '';
      document.getElementById('modal-save-btn').innerHTML = 'Salvar Alterações';
      const a = S.adm;
      const sel = document.getElementById('mf-tema');
      sel.innerHTML = a.temas.map(t => `<option value="${t._id}" ${t._id === q.trailId ? 'selected' : ''}>${t.icon || '✝'} ${t.name}</option>`).join('');
      document.getElementById('mf-theme').value = q.theme || '';
      document.getElementById('mf-image').value = q.image || '';
      document.getElementById('mf-question').value = q.question;
      const opts = q.options || q.opts || [];
      document.getElementById('mf-a').value = opts[0] || '';
      document.getElementById('mf-b').value = opts[1] || '';
      document.getElementById('mf-c').value = opts[2] || '';
      document.getElementById('mf-d').value = opts[3] || '';
      const ans = q.answer ?? q.ans;
      document.querySelectorAll('input[name="mf_ans"]').forEach(r => { r.checked = (+r.value === ans); });
      document.getElementById('mf-expl').value = q.explanation || q.exp || '';
      document.getElementById('qmodal').classList.add('open');
    }

    async function saveQuestion() {
      const err = document.getElementById('modal-err'); err.innerHTML = '';
      const temaId = document.getElementById('mf-tema').value;
      const theme = document.getElementById('mf-theme').value.trim();
      const question = document.getElementById('mf-question').value.trim();
      const options = [document.getElementById('mf-a').value.trim(), document.getElementById('mf-b').value.trim(),
      document.getElementById('mf-c').value.trim(), document.getElementById('mf-d').value.trim()];
      const ansEl = document.querySelector('input[name="mf_ans"]:checked');
      const answer = ansEl ? +ansEl.value : -1;
      const explanation = document.getElementById('mf-expl').value.trim();
      const image = document.getElementById('mf-image').value.trim() || null;

      if (!temaId) { showErr(err, 'Selecione um tema.'); return; }
      if (!question) { showErr(err, 'O enunciado é obrigatório.'); return; }
      if (options.some(o => !o)) { showErr(err, 'Preencha as 4 alternativas (A, B, C, D).'); return; }
      if (answer < 0) { showErr(err, 'Selecione a alternativa correta.'); return; }

      const btn = document.getElementById('modal-save-btn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> Salvando...';
      try {
        const payload = { temaId, theme, question, options, answer, explanation, image };
        if (S.adm.editingQ) { await api('PUT', `/api/admin/questions/${S.adm.editingQ._id}`, payload); }
        else { await api('POST', '/api/admin/questions', payload); }
        toast(S.adm.editingQ ? 'Questão atualizada!' : 'Questão adicionada! ✓', 'tok');
        document.getElementById('qmodal').classList.remove('open');
        showLoad(); await admLoad(); hideLoad(); render();
      } catch (ex) { showErr(err, ex.message); }
      finally { btn.disabled = false; btn.innerHTML = S.adm.editingQ ? 'Salvar Alterações' : 'Salvar Questão'; }
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('qmodal')) document.getElementById('qmodal').classList.remove('open');
    }

    async function confirmDelQ(id, preview) {
      if (!confirm(`Excluir esta questão?\n\n"${preview}"\n\nEsta ação não pode ser desfeita.`)) return;
      showLoad();
      try {
        await api('DELETE', `/api/admin/questions/${id}`);
        toast('Questão excluída.', 'tinfo');
        await admLoad(); hideLoad(); render();
      } catch (ex) { hideLoad(); toast(ex.message, 'terr'); }
    }

    // ═══════════════════════════════════════════════════════════
    // ADMIN — CRUD TEMAS
    // ═══════════════════════════════════════════════════════════
    function openEditTema(id) {
      const t = S.adm.temas.find(x => x._id === id); if (!t) return;
      document.getElementById('tmodal-title').textContent = `Editar Tema`;
      document.getElementById('tmodal-err').innerHTML = '';
      document.getElementById('tm-id').value = t._id;
      document.getElementById('tm-icon').value = t.icon || '✝';
      document.getElementById('tm-name').value = t.name || '';
      document.getElementById('tm-desc').value = t.desc || '';
      document.getElementById('tmodal').classList.add('open');
    }

    async function saveTema() {
      const err = document.getElementById('tmodal-err'); err.innerHTML = '';
      const id = document.getElementById('tm-id').value;
      const name = document.getElementById('tm-name').value.trim();
      const desc = document.getElementById('tm-desc').value.trim();
      const icon = document.getElementById('tm-icon').value.trim();
      if (!name) { showErr(err, 'Nome é obrigatório.'); return; }
      showLoad();
      try {
        await api('PUT', `/api/admin/temas/${id}`, { name, desc, icon });
        toast('Tema atualizado!', 'tok');
        document.getElementById('tmodal').classList.remove('open');
        await admLoad(); hideLoad(); render();
      } catch (ex) { hideLoad(); showErr(err, ex.message); }
    }

    function closeTemaModal(e) {
      if (!e || e.target === document.getElementById('tmodal')) document.getElementById('tmodal').classList.remove('open');
    }

    // ═══════════════════════════════════════════════════════════
    // ADMIN — CRUD TRILHAS
    // ═══════════════════════════════════════════════════════════
    let _ntTemaCount = 0;

    function openNtModal() {
      _ntTemaCount = 0;
      document.getElementById('ntmodal-err').innerHTML = '';
      document.getElementById('nt-icon').value = '🎯';
      document.getElementById('nt-name').value = '';
      document.getElementById('nt-desc').value = '';
      document.getElementById('nt-temas-list').innerHTML = '';
      addTemaRow(); addTemaRow(); // começa com 2 linhas
      document.getElementById('ntmodal').classList.add('open');
    }

    function addTemaRow() {
      if (_ntTemaCount >= 10) return;
      _ntTemaCount++;
      const n = _ntTemaCount;
      const row = document.createElement('div');
      row.className = 'tema-row';
      row.id = `nt-tema-row-${n}`;
      row.innerHTML = `
    <input class="fi" id="nt-t${n}-icon" type="text" maxlength="4" placeholder="✝" style="text-align:center">
    <input class="fi" id="nt-t${n}-name" type="text" maxlength="80" placeholder="Nome do Tema ${n}">
    <input class="fi" id="nt-t${n}-desc" type="text" maxlength="200" placeholder="Descrição (opcional)">
  `;
      document.getElementById('nt-temas-list').appendChild(row);
    }

    async function saveTrilha() {
      const err = document.getElementById('ntmodal-err'); err.innerHTML = '';
      const name = document.getElementById('nt-name').value.trim();
      const icon = document.getElementById('nt-icon').value.trim();
      const desc = document.getElementById('nt-desc').value.trim();
      if (!name) { showErr(err, 'Informe o nome da trilha.'); return; }

      const temas = [];
      for (let i = 1; i <= _ntTemaCount; i++) {
        const tname = document.getElementById(`nt-t${i}-name`)?.value.trim();
        const ticon = document.getElementById(`nt-t${i}-icon`)?.value.trim();
        const tdesc = document.getElementById(`nt-t${i}-desc`)?.value.trim();
        if (tname) temas.push({ name: tname, icon: ticon || '✝', desc: tdesc || '' });
      }
      if (temas.length === 0) { showErr(err, 'Adicione ao menos 1 tema com nome.'); return; }

      const btn = document.getElementById('nt-save-btn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> Criando...';
      try {
        await api('POST', '/api/admin/trilhas', { name, icon, desc, temas });
        toast('Trilha criada com sucesso! ✓', 'tok');
        document.getElementById('ntmodal').classList.remove('open');
        showLoad(); await admLoad(); hideLoad(); render();
      } catch (ex) { showErr(err, ex.message); }
      finally { btn.disabled = false; btn.innerHTML = 'Criar Trilha'; }
    }

    function closeNtModal(e) {
      if (!e || e.target === document.getElementById('ntmodal')) document.getElementById('ntmodal').classList.remove('open');
    }

    // ═══════════════════════════════════════════════════════════
    // RENDER DISPATCH
    // ═══════════════════════════════════════════════════════════
    const SCREENS = {
      adminLogin: rAdminLogin, reset: rReset,
      dashboard: rDash, quiz: rQuiz, stageEnd: rStageEnd, admin: rAdmin
    };

    function render() {
      document.getElementById('app').innerHTML = (SCREENS[S.screen] || rLogin)();
    }

    // ═══════════════════════════════════════════════════════════
    // UTILITÁRIOS
    // ═══════════════════════════════════════════════════════════
    function togglePwd(id) { const el = document.getElementById(id); if (el) el.type = el.type === 'password' ? 'text' : 'password'; }

    // ═══════════════════════════════════════════════════════════
    // PROGRESSO LOCAL (localStorage — sem login)
    // ═══════════════════════════════════════════════════════════
    function loadLocalProgress() {
      try { return JSON.parse(localStorage.getItem('dsa_progress') || '[]'); } catch { return []; }
    }
    function saveLocalProgress(trilhaId, temaIndex, data) {
      const all = loadLocalProgress();
      const idx = all.findIndex(p => p.trilha_id === trilhaId && p.tema_index === temaIndex);
      const rec = { trilha_id: trilhaId, tema_index: temaIndex, ...data };
      if (idx >= 0) { if (!all[idx].completed || data.score > all[idx].score) all[idx] = rec; }
      else all.push(rec);
      localStorage.setItem('dsa_progress', JSON.stringify(all));
      return all;
    }

    // ═══════════════════════════════════════════════════════════
    // INICIALIZAÇÃO
    // ═══════════════════════════════════════════════════════════
    async function init() {
      const params = new URLSearchParams(window.location.search);

      // Rota de reset de senha (via link de e-mail)
      if (params.get('action') === 'reset' && params.get('token')) {
        S.resetTok = params.get('token'); history.replaceState({}, '', '/'); S.screen = 'reset'; render(); return;
      }

      // Acesso admin via ?admin=1 ou token de suporte existente
      if (params.get('admin') === '1' || (S.token && S.user?.role === 'support')) {
        if (S.token) {
          showLoad();
          try {
            S.user = await api('GET', '/api/auth/me');
            if (S.user.role === 'support') { await admLoad(); S.screen = 'admin'; render(); hideLoad(); return; }
          } catch { clearAuth(); }
          hideLoad();
        }
        S.screen = 'adminLogin'; render(); return;
      }

      // Fluxo principal — sem login
      showLoad();
      try {
        const trilhas = await api('GET', '/api/trilhas');
        S.trilhas  = trilhas;
        S.progress = loadLocalProgress();
        S.trilha   = trilhas.find(t => !isTrilhaComplete(t, S.progress)) || trilhas[0] || null;
        S.screen   = 'dashboard';
      } catch (e) {
        toast('Erro ao carregar trilhas: ' + e.message, 'terr');
        S.screen = 'dashboard';
      }
      hideLoad(); render();
    }

    init();
  </script>
</body>
